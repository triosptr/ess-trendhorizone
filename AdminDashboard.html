<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title><?= appName ?></title>
    <?!= include('Styles'); ?>
  </head>
  <body>
    <div class="layout">
      <div class="sidebar">
        <h2>ESS Superadmin</h2>
        <button onclick="loadSummary()">Dashboard</button>
        <button onclick="loadEmployees()">Data Karyawan</button>
        <button onclick="loadEmployeeCreateForm()">Tambah Karyawan</button>
        <button onclick="loadLeaveManagement()">Manajemen Cuti</button>
        <button onclick="loadTodayAttendance()">Rekap Absensi Hari Ini</button>
        <button onclick="loadPayrollDocs()">Payroll Docs</button>
        <button onclick="loadPayrollForm()">Tambah Payroll Doc</button>
        <button onclick="loadAnnouncements()">Pemberitahuan</button>
        <button onclick="loadAnnouncementForm()">Tambah Pemberitahuan</button>
        <button onclick="loadDivisions()">Divisions</button>
        <button onclick="loadDivisionForm()">Tambah Division</button>
        <button onclick="loadPositions()">Positions</button>
        <button onclick="loadPositionForm()">Tambah Position</button>
        <button onclick="loadLeaveTypes()">Leave Types</button>
        <button onclick="loadLeaveTypeForm()">Tambah Leave Type</button>
        <button onclick="loadAdminNotifications()">Notifikasi</button>
      </div>

      <div class="main">
        <div class="card">
          <h1 class="page-title">Halo, <?= user.nama ?></h1>
          <div class="muted"><?= user.email ?> • role: <?= user.role ?></div>
        </div>
        <? if (newDashboardUrl) { ?>
        <div class="card">
          <div class="section-title">
            <h3 class="mb-0">Tema Baru Siap Digunakan</h3>
            <div class="actions">
              <a class="btn btn-primary" href="<?= newDashboardUrl ?>" target="_blank">Buka Dashboard V2</a>
              <a class="btn btn-secondary" href="?theme=v2" target="_top">Gunakan Jalur V2</a>
            </div>
          </div>
        </div>
        <? } ?>

        <div id="content"></div>
      </div>
    </div>

    <?!= include('Scripts'); ?>

    <script>
      let employeeFormOptionsCache = { divisions: [], positions: [], roles: [], status_karyawan_options: [] };
      let employeeRowsCache = [];

      async function loadSummary() {
        try {
          setLoading('Memuat ringkasan dashboard...');

          const results = await Promise.all([
            runServer('getAdminSummary'),
            runServer('getAdminLeaveNotificationSummary')
          ]);

          const data = results[0];
          const notif = results[1] || {};

          setContent(`
            <div class="cards">
              <div class="card"><div>Total Karyawan Aktif</div><div class="stat">${escapeHtml(safe(data.totalEmployees))}</div></div>
              <div class="card"><div>Total Superadmin</div><div class="stat">${escapeHtml(safe(data.totalSuperadmin))}</div></div>
              <div class="card"><div>Pending Cuti</div><div class="stat">${escapeHtml(safe(data.pendingLeaves))}</div></div>
              <div class="card"><div>Absensi Hari Ini</div><div class="stat">${escapeHtml(safe(data.todayAttendance))}</div></div>
            </div>

            <div class="cards">
              <div class="card">
                <div>Pengajuan Cuti Baru</div>
                <div class="stat">${escapeHtml(safe(notif.unread_new_leave_requests || 0))}</div>
                <div class="actions" style="margin-top:12px;">
                  <button class="btn btn-primary" onclick="loadAdminNotifications()">Lihat Notifikasi</button>
                </div>
              </div>
            </div>
          `);
        } catch (err) {
          notifyError(err);
        }
      }

      async function loadEmployees() {
        try {
          setLoading('Memuat data karyawan...');
          const rows = await runServer('getAllEmployeesForAdmin');

          if (!Array.isArray(rows)) {
            setContent(renderError('Data karyawan tidak valid.'));
            return;
          }

          employeeRowsCache = rows.slice();

          if (rows.length === 0) {
            setContent(renderEmpty('Data Karyawan', 'Belum ada data karyawan.'));
            return;
          }

          const divisionSet = {};
          rows.forEach(function(r) {
            const div = String(safe(r.divisi)).trim();
            if (div) divisionSet[div] = true;
          });

          const divisionOptions = Object.keys(divisionSet)
            .sort(function(a, b) { return a.localeCompare(b); })
            .map(function(div) {
              return `<option value="${escapeHtml(div)}">${escapeHtml(div)}</option>`;
            })
            .join('');

          setContent(`
              <div class="section-title">
                <h3 class="mb-0">Data Karyawan</h3>
                <div class="actions">
                  <button class="btn btn-primary" onclick="exportEmployeesPdfUi()">Export PDF</button>
                </div>
              </div>
              <div class="muted" style="margin-bottom:12px;">Total data awal: ${escapeHtml(String(rows.length))}</div>

              <div class="grid-3" style="margin-bottom:14px;">
                <div class="form-group">
                  <label for="emp_search">Cari Karyawan</label>
                  <input type="text" id="emp_search" placeholder="Cari nama / email / employee ID">
                </div>

                <div class="form-group">
                  <label for="emp_filter_role">Filter Role</label>
                  <select id="emp_filter_role">
                    <option value="">Semua Role</option>
                    <option value="employee">employee</option>
                    <option value="superadmin">superadmin</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="emp_filter_active">Filter Status Aktif</label>
                  <select id="emp_filter_active">
                    <option value="">Semua Status</option>
                    <option value="TRUE">TRUE</option>
                    <option value="FALSE">FALSE</option>
                  </select>
                </div>
              </div>

              <div class="grid-2" style="margin-bottom:14px;">
                <div class="form-group">
                  <label for="emp_filter_divisi">Filter Divisi</label>
                  <select id="emp_filter_divisi">
                    <option value="">Semua Divisi</option>
                    ${divisionOptions}
                  </select>
                </div>

                <div class="form-group" style="display:flex; align-items:end; gap:10px;">
                  <button class="btn btn-secondary" onclick="resetEmployeeFilters()">Reset Filter</button>
                  <button class="btn btn-primary" onclick="loadEmployeeCreateForm()">Tambah Karyawan</button>
                </div>
              </div>

              <div id="employee_table_container"></div>
            </div>
          `);

          bindEmployeeFilterEvents();
          renderEmployeeTable(employeeRowsCache);
        } catch (err) {
          notifyError(err);
        }
      }

      function bindEmployeeFilterEvents() {
        const searchEl = document.getElementById('emp_search');
        const roleEl = document.getElementById('emp_filter_role');
        const activeEl = document.getElementById('emp_filter_active');
        const divisiEl = document.getElementById('emp_filter_divisi');

        if (searchEl) searchEl.addEventListener('input', applyEmployeeFilters);
        if (roleEl) roleEl.addEventListener('change', applyEmployeeFilters);
        if (activeEl) activeEl.addEventListener('change', applyEmployeeFilters);
        if (divisiEl) divisiEl.addEventListener('change', applyEmployeeFilters);
      }

      function resetEmployeeFilters() {
        const searchEl = document.getElementById('emp_search');
        const roleEl = document.getElementById('emp_filter_role');
        const activeEl = document.getElementById('emp_filter_active');
        const divisiEl = document.getElementById('emp_filter_divisi');

        if (searchEl) searchEl.value = '';
        if (roleEl) roleEl.value = '';
        if (activeEl) activeEl.value = '';
        if (divisiEl) divisiEl.value = '';

        renderEmployeeTable(employeeRowsCache);
      }

      function applyEmployeeFilters() {
        const keyword = String((document.getElementById('emp_search') || {}).value || '').trim().toLowerCase();
        const role = String((document.getElementById('emp_filter_role') || {}).value || '').trim().toLowerCase();
        const active = String((document.getElementById('emp_filter_active') || {}).value || '').trim().toUpperCase();
        const divisi = String((document.getElementById('emp_filter_divisi') || {}).value || '').trim().toLowerCase();

        const filtered = employeeRowsCache.filter(function(r) {
          const employeeId = String(safe(r.employee_id)).toLowerCase();
          const nama = String(safe(r.nama)).toLowerCase();
          const email = String(safe(r.email)).toLowerCase();
          const rowRole = String(safe(r.role)).toLowerCase();
          const rowDivisi = String(safe(r.divisi)).toLowerCase();
          const rowActive = String(safe(r.is_active)).trim().toUpperCase();

          const matchKeyword = !keyword ||
            employeeId.indexOf(keyword) !== -1 ||
            nama.indexOf(keyword) !== -1 ||
            email.indexOf(keyword) !== -1;

          const matchRole = !role || rowRole === role;
          const matchActive = !active || rowActive === active;
          const matchDivisi = !divisi || rowDivisi === divisi;

          return matchKeyword && matchRole && matchActive && matchDivisi;
        });

        renderEmployeeTable(filtered);
      }

      function renderEmployeeTable(rows) {
        const container = document.getElementById('employee_table_container');
        if (!container) return;

        if (!Array.isArray(rows) || rows.length === 0) {
          container.innerHTML = `
            <div class="card" style="margin-top:10px;">
              <div class="muted">Tidak ada data yang sesuai filter.</div>
            </div>
          `;
          return;
        }

        let html = `
          <div class="muted" style="margin-bottom:10px;">Total hasil filter: ${escapeHtml(String(rows.length))}</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nama</th>
                  <th>Email</th>
                  <th>Divisi</th>
                  <th>Jabatan</th>
                  <th>Role</th>
                  <th>Status Aktif</th>
                  <th>Sisa Cuti</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody>
        `;

        rows.forEach(function(r) {
          const nextValue = String(safe(r.is_active)).trim().toUpperCase() === 'TRUE' ? 'FALSE' : 'TRUE';
          const buttonLabel = String(safe(r.is_active)).trim().toUpperCase() === 'TRUE' ? 'Nonaktifkan' : 'Aktifkan';

          html += `
            <tr>
              <td>${escapeHtml(safe(r.employee_id))}</td>
              <td>${escapeHtml(safe(r.nama))}</td>
              <td>${escapeHtml(safe(r.email))}</td>
              <td>${escapeHtml(safe(r.divisi))}</td>
              <td>${escapeHtml(safe(r.jabatan))}</td>
              <td>${escapeHtml(safe(r.role))}</td>
              <td>${normalizeStatusBadge(r.is_active)}</td>
              <td>${escapeHtml(safe(r.sisa_cuti))}</td>
              <td>
                <div class="actions">
                  <button class="btn btn-primary" onclick="loadEmployeeDetail('${safe(r.employee_id)}')">Detail</button>
                  <button class="btn btn-secondary" onclick="loadEmployeeEditForm('${safe(r.employee_id)}')">Edit</button>
                  <button class="btn btn-secondary" onclick="exportEmployeeDetailPdfUi('${safe(r.employee_id)}')">PDF</button>
                  <button class="btn btn-secondary" onclick="toggleEmployeeStatus('${safe(r.employee_id)}','${nextValue}')">${buttonLabel}</button>
                </div>
              </td>
            </tr>
          `;
        });

        html += `
              </tbody>
            </table>
          </div>
        `;

        container.innerHTML = html;
      }

      async function loadEmployeeDetail(employeeId) {
        try {
          setLoading('Memuat detail karyawan...');

          const results = await Promise.all([
            runServer('getEmployeeByIdForAdmin', employeeId),
            runServer('getEmployeeAuditLogsForAdmin', employeeId)
          ]);

          const employee = results[0];
          const logs = Array.isArray(results[1]) ? results[1] : [];

          let logHtml = '';
          if (logs.length === 0) {
            logHtml = '<div class="muted">Belum ada riwayat perubahan.</div>';
          } else {
            logHtml += `
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Timestamp</th>
                      <th>User Email</th>
                      <th>Aksi</th>
                      <th>Modul</th>
                      <th>Detail</th>
                    </tr>
                  </thead>
                  <tbody>
            `;

            logs.forEach(function(log) {
              logHtml += `
                <tr>
                  <td>${escapeHtml(formatDateTimeDisplay(log.timestamp))}</td>
                  <td>${escapeHtml(safe(log.user_email))}</td>
                  <td>${escapeHtml(safe(log.aksi))}</td>
                  <td>${escapeHtml(safe(log.modul))}</td>
                  <td>${escapeHtml(safe(log.detail))}</td>
                </tr>
              `;
            });

            logHtml += `
                  </tbody>
                </table>
              </div>
            `;
          }

          setContent(`
            <div class="card">
              <div class="section-title">
                <h3 class="mb-0">Detail Karyawan</h3>
                <div class="actions">
                  <button class="btn btn-secondary" onclick="loadEmployees()">Kembali</button>
                  <button class="btn btn-primary" onclick="loadEmployeeEditForm('${escapeHtml(safe(employee.employee_id))}')">Edit</button>
                </div>
              </div>

              <div class="grid-2">
                <div>
                  <p><b>Employee ID:</b><br>${escapeHtml(safe(employee.employee_id))}</p>
                  <p><b>Nama:</b><br>${escapeHtml(safe(employee.nama))}</p>
                  <p><b>Email:</b><br>${escapeHtml(safe(employee.email))}</p>
                  <p><b>NIK:</b><br>${escapeHtml(safe(employee.nik))}</p>
                  <p><b>Divisi:</b><br>${escapeHtml(safe(employee.divisi))}</p>
                  <p><b>Jabatan:</b><br>${escapeHtml(safe(employee.jabatan))}</p>
                  <p><b>Atasan Email:</b><br>${escapeHtml(safe(employee.atasan_email))}</p>
                </div>
                <div>
                  <p><b>Status Karyawan:</b><br>${escapeHtml(safe(employee.status_karyawan))}</p>
                  <p><b>Tanggal Masuk:</b><br>${escapeHtml(formatDateDisplay(employee.tanggal_masuk))}</p>
                  <p><b>Jatah Cuti:</b><br>${escapeHtml(safe(employee.jatah_cuti))}</p>
                  <p><b>Sisa Cuti:</b><br>${escapeHtml(safe(employee.sisa_cuti))}</p>
                  <p><b>No HP:</b><br>${escapeHtml(safe(employee.no_hp))}</p>
                  <p><b>Role:</b><br>${escapeHtml(safe(employee.role))}</p>
                  <p><b>Status Aktif:</b><br>${normalizeStatusBadge(employee.is_active)}</p>
                </div>
              </div>

              <div class="form-group">
                <label>Alamat</label>
                <div class="muted">${escapeHtml(safe(employee.alamat)) || '-'}</div>
              </div>
            </div>

            <div class="card">
              <h3>Riwayat Perubahan Karyawan</h3>
              ${logHtml}
            </div>
          `);
        } catch (err) {
          notifyError(err);
        }
      }

      async function loadEmployeeCreateForm() {
        try {
          setLoading('Memuat form karyawan...');
          employeeFormOptionsCache = await runServer('getEmployeeFormOptionsForAdmin');

          setContent(renderEmployeeFormHtml({
            mode: 'create',
            data: {
              employee_id: '',
              nama: '',
              email: '',
              nik: '',
              divisi: '',
              jabatan: '',
              atasan_email: '',
              status_karyawan: 'Tetap',
              tanggal_masuk: '',
              jatah_cuti: 12,
              sisa_cuti: 12,
              no_hp: '',
              alamat: '',
              role: 'employee',
              is_active: 'TRUE'
            }
          }));

          filterPositionOptionsByDivision('');
        } catch (err) {
          notifyError(err);
        }
      }

      async function loadEmployeeEditForm(employeeId) {
        try {
          setLoading('Memuat data karyawan...');
          const results = await Promise.all([
            runServer('getEmployeeFormOptionsForAdmin'),
            runServer('getEmployeeByIdForAdmin', employeeId)
          ]);

          employeeFormOptionsCache = results[0];
          const employee = results[1];

          setContent(renderEmployeeFormHtml({
            mode: 'edit',
            data: {
              employee_id: safe(employee.employee_id),
              nama: safe(employee.nama),
              email: safe(employee.email),
              nik: safe(employee.nik),
              divisi: safe(employee.divisi),
              jabatan: safe(employee.jabatan),
              atasan_email: safe(employee.atasan_email),
              status_karyawan: safe(employee.status_karyawan),
              tanggal_masuk: formatDateDisplay(employee.tanggal_masuk),
              jatah_cuti: safe(employee.jatah_cuti),
              sisa_cuti: safe(employee.sisa_cuti),
              no_hp: safe(employee.no_hp),
              alamat: safe(employee.alamat),
              role: safe(employee.role),
              is_active: String(safe(employee.is_active)).trim().toUpperCase() === 'TRUE' ? 'TRUE' : 'FALSE'
            }
          }));

          filterPositionOptionsByDivision(safe(employee.jabatan));
        } catch (err) {
          notifyError(err);
        }
      }

      function renderEmployeeFormHtml(config) {
        const mode = config.mode;
        const data = config.data || {};

        const divisionOptions = (employeeFormOptionsCache.divisions || []).map(function(item) {
          const selected = String(safe(item.nama_divisi)) === String(safe(data.divisi)) ? 'selected' : '';
          return `<option value="${escapeHtml(safe(item.nama_divisi))}" ${selected}>${escapeHtml(safe(item.nama_divisi))}</option>`;
        }).join('');

        const roleOptions = (employeeFormOptionsCache.roles || ['employee', 'superadmin']).map(function(item) {
          const selected = String(safe(item)) === String(safe(data.role)) ? 'selected' : '';
          return `<option value="${escapeHtml(safe(item))}" ${selected}>${escapeHtml(safe(item))}</option>`;
        }).join('');

        const statusKaryawanOptions = (employeeFormOptionsCache.status_karyawan_options || ['Tetap', 'Kontrak', 'Probation', 'Freelance']).map(function(item) {
          const selected = String(safe(item)) === String(safe(data.status_karyawan)) ? 'selected' : '';
          return `<option value="${escapeHtml(safe(item))}" ${selected}>${escapeHtml(safe(item))}</option>`;
        }).join('');

        const activeOptions = ['TRUE', 'FALSE'].map(function(item) {
          const selected = String(item) === String(safe(data.is_active)) ? 'selected' : '';
          return `<option value="${item}" ${selected}>${item}</option>`;
        }).join('');

        const title = mode === 'edit' ? 'Edit Karyawan' : 'Tambah Karyawan';
        const submitFn = mode === 'edit' ? 'submitEmployeeUpdateForm()' : 'submitEmployeeCreateForm()';
        const employeeIdReadOnly = mode === 'edit' ? 'readonly' : '';

        return `
          <div class="card">
            <h3>${title}</h3>

            <div class="grid-2">
              <div class="form-group">
                <label for="emp_employee_id">Employee ID</label>
                <input type="text" id="emp_employee_id" value="${escapeHtml(safe(data.employee_id))}" ${employeeIdReadOnly}>
              </div>
              <div class="form-group">
                <label for="emp_nama">Nama</label>
                <input type="text" id="emp_nama" value="${escapeHtml(safe(data.nama))}">
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label for="emp_email">Email</label>
                <input type="text" id="emp_email" value="${escapeHtml(safe(data.email))}">
              </div>
              <div class="form-group">
                <label for="emp_nik">NIK</label>
                <input type="text" id="emp_nik" value="${escapeHtml(safe(data.nik))}">
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label for="emp_divisi">Divisi</label>
                <select id="emp_divisi" onchange="filterPositionOptionsByDivision()">
                  <option value="">-- Pilih Divisi --</option>
                  ${divisionOptions}
                </select>
              </div>
              <div class="form-group">
                <label for="emp_jabatan">Jabatan</label>
                <select id="emp_jabatan" data-selected="${escapeHtml(safe(data.jabatan))}">
                  <option value="">-- Pilih Jabatan --</option>
                </select>
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label for="emp_atasan_email">Atasan Email</label>
                <input type="text" id="emp_atasan_email" value="${escapeHtml(safe(data.atasan_email))}">
              </div>
              <div class="form-group">
                <label for="emp_status_karyawan">Status Karyawan</label>
                <select id="emp_status_karyawan">${statusKaryawanOptions}</select>
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label for="emp_tanggal_masuk">Tanggal Masuk</label>
                <input type="date" id="emp_tanggal_masuk" value="${escapeHtml(safe(data.tanggal_masuk))}">
              </div>
              <div class="form-group">
                <label for="emp_role">Role</label>
                <select id="emp_role">${roleOptions}</select>
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label for="emp_jatah_cuti">Jatah Cuti</label>
                <input type="number" id="emp_jatah_cuti" value="${escapeHtml(safe(data.jatah_cuti))}">
              </div>
              <div class="form-group">
                <label for="emp_sisa_cuti">Sisa Cuti</label>
                <input type="number" id="emp_sisa_cuti" value="${escapeHtml(safe(data.sisa_cuti))}">
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label for="emp_no_hp">No HP</label>
                <input type="text" id="emp_no_hp" value="${escapeHtml(safe(data.no_hp))}">
              </div>
              <div class="form-group">
                <label for="emp_is_active">Status Aktif</label>
                <select id="emp_is_active">${activeOptions}</select>
              </div>
            </div>

            <div class="form-group">
              <label for="emp_alamat">Alamat</label>
              <textarea id="emp_alamat">${escapeHtml(safe(data.alamat))}</textarea>
            </div>

            <div class="actions">
              <button class="btn btn-secondary" onclick="loadEmployees()">Kembali</button>
              <button class="btn btn-primary" onclick="loadEmployeeEditForm('${escapeHtml(safe(employee.employee_id))}')">Edit</button>
              <button class="btn btn-secondary" onclick="exportEmployeeDetailPdfUi('${escapeHtml(safe(employee.employee_id))}')">Export PDF</button>
            </div>
          </div>
        `;
      }

      function filterPositionOptionsByDivision(selectedJabatanOverride) {
        const divisiEl = document.getElementById('emp_divisi');
        const jabatanEl = document.getElementById('emp_jabatan');
        if (!divisiEl || !jabatanEl) return;

        const selectedDivisiName = String(divisiEl.value || '').trim();
        const selectedJabatan = String(
          selectedJabatanOverride !== undefined
            ? selectedJabatanOverride
            : (jabatanEl.getAttribute('data-selected') || '')
        ).trim();

        let selectedDivisionId = '';

        (employeeFormOptionsCache.divisions || []).forEach(function(div) {
          if (String(safe(div.nama_divisi)).trim() === selectedDivisiName) {
            selectedDivisionId = String(safe(div.division_id)).trim();
          }
        });

        let options = '<option value="">-- Pilih Jabatan --</option>';

        (employeeFormOptionsCache.positions || []).forEach(function(pos) {
          const posDivisionId = String(safe(pos.division_id)).trim();
          const posName = String(safe(pos.nama_jabatan)).trim();

          if (!selectedDivisionId || posDivisionId === selectedDivisionId) {
            const selectedAttr = posName === selectedJabatan ? 'selected' : '';
            options += `<option value="${escapeHtml(posName)}" ${selectedAttr}>${escapeHtml(posName)}</option>`;
          }
        });

        jabatanEl.innerHTML = options;
        jabatanEl.setAttribute('data-selected', '');
      }

      function collectEmployeeFormPayload() {
        return {
          employee_id: document.getElementById('emp_employee_id').value,
          nama: document.getElementById('emp_nama').value,
          email: document.getElementById('emp_email').value,
          nik: document.getElementById('emp_nik').value,
          divisi: document.getElementById('emp_divisi').value,
          jabatan: document.getElementById('emp_jabatan').value,
          atasan_email: document.getElementById('emp_atasan_email').value,
          status_karyawan: document.getElementById('emp_status_karyawan').value,
          tanggal_masuk: document.getElementById('emp_tanggal_masuk').value,
          jatah_cuti: document.getElementById('emp_jatah_cuti').value,
          sisa_cuti: document.getElementById('emp_sisa_cuti').value,
          no_hp: document.getElementById('emp_no_hp').value,
          alamat: document.getElementById('emp_alamat').value,
          role: document.getElementById('emp_role').value,
          is_active: document.getElementById('emp_is_active').value
        };
      }

      async function submitEmployeeCreateForm() {
        try {
          const payload = collectEmployeeFormPayload();
          setLoading('Menyimpan data karyawan...');

            const nextValue = String(safe(r.is_active)).trim().toUpperCase() === 'TRUE' ? 'FALSE' : 'TRUE';
            const buttonLabel = String(safe(r.is_active)).trim().toUpperCase() === 'TRUE' ? 'Nonaktifkan' : 'Aktifkan';

            html += `
              <tr>
                <td>${escapeHtml(safe(r.leave_type_id))}</td>
                <td>${escapeHtml(safe(r.nama_jenis_cuti))}</td>
                <td>${escapeHtml(safe(r.maks_hari))}</td>
                <td>${normalizeStatusBadge(r.is_paid)}</td>
                <td>${normalizeStatusBadge(r.requires_attachment)}</td>
                <td>${normalizeStatusBadge(r.is_active)}</td>
                <td><button class="btn btn-secondary" onclick="toggleLeaveType('${safe(r.leave_type_id)}','${nextValue}')">${buttonLabel}</button></td>
              </tr>
            `;
          });

          html += `</tbody></table></div></div>`;
          setContent(html);
        } catch (err) {
          notifyError(err);
        }
      }

let leaveManagementCache = [];
let leaveManagementCurrentStatus = 'pending';

async function loadPendingLeaves() {

}

async function loadLeaveManagement(defaultStatus) {
  try {
    const selectedStatus = defaultStatus || leaveManagementCurrentStatus || 'pending';
    leaveManagementCurrentStatus = selectedStatus;

    setLoading('Memuat data manajemen cuti...');

    const rows = await runServer('getAllLeaveRequestsForAdmin', {
      status: selectedStatus,
      keyword: '',
      start_date: '',
      end_date: ''
    });

    if (!Array.isArray(rows)) {
      setContent(renderError('Data cuti tidak valid.'));
      return;
    }

    leaveManagementCache = rows.slice();

    setContent(`
      <div class="card">
        <div class="section-title">
          <h3 class="mb-0">Manajemen Cuti</h3>
          <div class="actions">
            <button class="btn ${selectedStatus === 'pending' ? 'btn-primary' : 'btn-secondary'}" onclick="switchLeaveTab('pending')">Pending</button>
            <button class="btn ${selectedStatus === 'approved' ? 'btn-primary' : 'btn-secondary'}" onclick="switchLeaveTab('approved')">Approved</button>
            <button class="btn ${selectedStatus === 'rejected' ? 'btn-primary' : 'btn-secondary'}" onclick="switchLeaveTab('rejected')">Rejected</button>
            <button class="btn ${selectedStatus === 'all' ? 'btn-primary' : 'btn-secondary'}" onclick="switchLeaveTab('all')">Semua</button>
          </div>
        </div>

        <div class="grid-3" style="margin-bottom:14px;">
          <div class="form-group">
            <label for="leave_keyword">Cari</label>
            <input type="text" id="leave_keyword" placeholder="Cari email / employee ID / jenis cuti / leave ID">
          </div>
          <div class="form-group">
            <label for="leave_start_date">Tanggal Mulai</label>
            <input type="date" id="leave_start_date">
          </div>
          <div class="form-group">
            <label for="leave_end_date">Tanggal Selesai</label>
            <input type="date" id="leave_end_date">
          </div>
        </div>

        <div class="actions" style="margin-bottom:14px;">
          <button class="btn btn-primary" onclick="applyLeaveFilters()">Terapkan Filter</button>
          <button class="btn btn-secondary" onclick="resetLeaveFilters()">Reset</button>
        </div>

        <div id="leave_management_table_container"></div>
      </div>
    `);

    renderLeaveManagementTable(leaveManagementCache);
  } catch (err) {
    notifyError(err);
  }
}

async function switchLeaveTab(status) {
  leaveManagementCurrentStatus = status;
  await loadLeaveManagement(status);
}

async function applyLeaveFilters() {
  try {
    const keyword = String(document.getElementById('leave_keyword').value || '').trim();
    const startDate = String(document.getElementById('leave_start_date').value || '').trim();
    const endDate = String(document.getElementById('leave_end_date').value || '').trim();

    setLoading('Menerapkan filter cuti...');

    const rows = await runServer('getAllLeaveRequestsForAdmin', {
      status: leaveManagementCurrentStatus || 'pending',
      keyword: keyword,
      start_date: startDate,
      end_date: endDate
    });

    leaveManagementCache = Array.isArray(rows) ? rows.slice() : [];
    await loadLeaveManagementWithCurrentView_();
  } catch (err) {
    notifyError(err);
  }
}

function renderLeaveManagementTable(rows) {
  const container = document.getElementById('leave_management_table_container');
  if (!container) return;

  if (!Array.isArray(rows) || rows.length === 0) {
    container.innerHTML = `
      <div class="card">
        <div class="muted">Tidak ada data cuti untuk filter saat ini.</div>
      </div>
    `;
    return;
  }

  let html = ''
    + '<div class="muted" style="margin-bottom:10px;">Total data: ' + escapeHtml(String(rows.length)) + '</div>'
    + '<div class="table-wrap">'
    +   '<table>'
    +     '<thead>'
    +       '<tr>'
    +         '<th>Leave ID</th>'
    +         '<th>Employee ID</th>'
    +         '<th>Email</th>'
    +         '<th>Jenis Cuti</th>'
    +         '<th>Tanggal Mulai</th>'
    +         '<th>Tanggal Selesai</th>'
    +         '<th>Jumlah Hari</th>'
    +         '<th>Alasan</th>'
    +         '<th>Surat</th>'
    +         '<th>Status</th>'
    +         '<th>Catatan Approver</th>'
    +         '<th>Aksi</th>'
    +       '</tr>'
    +     '</thead>'
    +     '<tbody>';

  rows.forEach(function(r) {
    const canApproveReject = String(safe(r.status)).trim().toLowerCase() === 'pending';

    html += ''
      + '<tr>'
      +   '<td>' + escapeHtml(safe(r.leave_id)) + '</td>'
      +   '<td>' + escapeHtml(safe(r.employee_id)) + '</td>'
      +   '<td>' + escapeHtml(safe(r.email)) + '</td>'
      +   '<td>' + escapeHtml(safe(r.jenis_cuti)) + '</td>'
      +   '<td>' + escapeHtml(formatDateDisplay(r.tanggal_mulai)) + '</td>'
      +   '<td>' + escapeHtml(formatDateDisplay(r.tanggal_selesai)) + '</td>'
      +   '<td>' + escapeHtml(safe(r.jumlah_hari)) + '</td>'
      +   '<td>' + escapeHtml(safe(r.alasan)) + '</td>'
      +   '<td>' + renderDrivePreview(r.lampiran_url) + '</td>'
      +   '<td>' + normalizeStatusBadge(r.status) + '</td>'
      +   '<td>' + escapeHtml(safe(r.catatan_approver || '-')) + '</td>'
      +   '<td>';

    if (canApproveReject) {
      html += ''
        + '<div class="actions">'
        +   '<button class="btn btn-primary" data-id="' + escapeHtml(safe(r.leave_id)) + '" onclick="approveLeaveByBtn(this)">Approve</button>'
        +   '<button class="btn btn-danger" data-id="' + escapeHtml(safe(r.leave_id)) + '" onclick="rejectLeaveByBtn(this)">Reject</button>'
        + '</div>';
    } else {
      html += '<span class="muted">Selesai</span>';
    }

    html += ''
      +   '</td>'
      + '</tr>';
  });

  html += ''
    +     '</tbody>'
    +   '</table>'
    + '</div>';

  container.innerHTML = html;
}

async function loadAdminNotifications() {
  try {
    setLoading('Memuat notifikasi pengajuan cuti baru...');

    const results = await Promise.all([
      runServer('getAdminLeaveNotificationSummary'),
      runServer('getAdminLeaveNotifications')
    ]);

    const summary = results[0] || {};
    const rows = Array.isArray(results[1]) ? results[1] : [];

    let html = `
      <div class="cards">
        <div class="card">
          <div>Pengajuan Cuti Baru</div>
          <div class="stat">${escapeHtml(safe(summary.unread_new_leave_requests || 0))}</div>
        </div>
        <div class="card">
          <div>Total Pending Tercatat</div>
          <div class="stat">${escapeHtml(safe(summary.total_items || 0))}</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">
          <h3 class="mb-0">Notifikasi Pengajuan Cuti Baru</h3>
          <div class="actions">
            <button class="btn btn-primary" onclick="markAdminNotificationsSeenAndReload()">Tandai Semua Dilihat</button>
            <button class="btn btn-secondary" onclick="loadLeaveManagement('pending')">Buka Manajemen Cuti</button>
          </div>
        </div>
    `;

    if (!rows.length) {
      html += `<div class="muted">Belum ada notifikasi cuti baru.</div>`;
    } else {
      rows.forEach(function(r) {
        const isUnread = String(safe(r.is_unread)).trim().toUpperCase() === 'TRUE';
        const badge = isUnread
          ? '<span class="badge badge-warning">Baru</span>'
          : '<span class="badge badge-neutral">Dilihat</span>';

        html += `
          <div class="card" style="margin-top:12px; border:1px solid #e2e8f0;">
            <div class="section-title">
              <h3 class="mb-0">${escapeHtml(safe(r.email))}</h3>
              <div>${badge}</div>
            </div>

            <div class="grid-2">
              <div>
                <p><b>Leave ID:</b><br>${escapeHtml(safe(r.leave_id))}</p>
                <p><b>Employee ID:</b><br>${escapeHtml(safe(r.employee_id))}</p>
                <p><b>Jenis Cuti:</b><br>${escapeHtml(safe(r.jenis_cuti))}</p>
                <p><b>Jumlah Hari:</b><br>${escapeHtml(safe(r.jumlah_hari))}</p>
              </div>
              <div>
                <p><b>Tanggal Mulai:</b><br>${escapeHtml(formatDateDisplay(r.tanggal_mulai))}</p>
                <p><b>Tanggal Selesai:</b><br>${escapeHtml(formatDateDisplay(r.tanggal_selesai))}</p>
                <p><b>Dibuat:</b><br>${escapeHtml(formatDateTimeDisplay(r.created_at))}</p>
                <p><b>Status:</b><br>${normalizeStatusBadge(r.status)}</p>
              </div>
            </div>

            <p><b>Alasan:</b><br>${escapeHtml(safe(r.alasan || '-'))}</p>
            <p><b>Lampiran:</b><br>${renderDrivePreview(r.lampiran_url)}</p>

            <div class="actions">
              <button class="btn btn-primary" onclick="loadLeaveManagement('pending')">Review di Manajemen Cuti</button>
            </div>
          </div>
        `;
      });
    }

    html += `</div>`;
    setContent(html);
  } catch (err) {
    notifyError(err);
  }
}
