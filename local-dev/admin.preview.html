<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin API Preview</title>
    <style>
      body { font-family: Arial, sans-serif; background: #eef2ff; margin: 0; padding: 20px; color: #0f172a; }
      .wrap { max-width: 1120px; margin: 0 auto; }
      .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 6px 18px rgba(15,23,42,.08); margin-bottom: 14px; }
      h1,h2,h3 { margin: 0 0 10px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 12px; }
      label { display: block; font-size: 12px; color: #475569; margin-bottom: 4px; }
      input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 10px; font-size: 14px; }
      textarea { min-height: 80px; resize: vertical; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      button { border: 0; border-radius: 8px; padding: 9px 12px; background: #1d4ed8; color: #fff; cursor: pointer; font-weight: 700; }
      button.alt { background: #334155; }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; background: #0b1020; color: #dbeafe; padding: 12px; border-radius: 8px; max-height: 320px; overflow: auto; }
      .muted { color: #64748b; font-size: 13px; }
      a { color: #1d4ed8; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Admin Preview (Vercel API + Supabase)</h1>
        <p class="muted">Halaman pengujian endpoint admin untuk migrasi Apps Script.</p>
        <div class="grid">
          <div>
            <label>Base URL API</label>
            <input id="baseUrl" value="https://ess-2026-trendhorizone-id.vercel.app">
          </div>
          <div>
            <label>x-user-email</label>
            <input id="adminEmail" value="admin@perusahaan.com">
          </div>
          <div>
            <label>x-user-role</label>
            <select id="adminRole">
              <option value="superadmin" selected>superadmin</option>
              <option value="admin">admin</option>
            </select>
          </div>
          <div>
            <label>Test Employee ID</label>
            <input id="testEmployeeId" value="EMP_DEMO_001">
          </div>
        </div>
        <div class="actions">
          <button onclick="callGet('/api/health', false)">Health</button>
          <button onclick="callGet('/api/admin/employees?limit=50')">List Employees</button>
          <button onclick="callGet('/api/admin/attendance/today')">Attendance Today</button>
          <button onclick="callGet('/api/admin/leaves/pending')">Pending Leaves</button>
          <button onclick="callGet('/api/admin/leaves?status=approved')">Approved Leaves</button>
          <button onclick="callGet('/api/admin/announcements')">Announcements</button>
          <button onclick="callGet('/api/admin/payroll-docs')">Payroll Docs</button>
          <button onclick="callGet('/api/admin/master/divisions')">Master Divisions</button>
          <button onclick="callGet('/api/admin/master/positions')">Master Positions</button>
          <button onclick="callGet('/api/admin/master/leave-types')">Master Leave Types</button>
          <button onclick="callGet('/api/admin/notifications/leave/summary')">Notif Leave Summary</button>
          <button onclick="callGet('/api/admin/notifications/leave')">Notif Leave List</button>
          <button onclick="callGet('/api/admin/reports/employees?limit=100')">Report Employees</button>
        </div>
      </div>

      <div class="card">
        <h3>Buat Employee</h3>
        <div class="grid">
          <div><label>Employee ID</label><input id="newEmpId" value=""></div>
          <div><label>Email</label><input id="newEmpEmail" value=""></div>
          <div><label>Nama</label><input id="newEmpName" value=""></div>
          <div><label>Role</label><select id="newEmpRole"><option value="employee">employee</option><option value="admin">admin</option><option value="superadmin">superadmin</option></select></div>
        </div>
        <div class="actions"><button onclick="createEmployee()">POST Create Employee</button></div>
      </div>

      <div class="card">
        <h3>Approval Cuti</h3>
        <div class="grid">
          <div><label>Leave ID</label><input id="leaveIdAction" value=""></div>
          <div><label>Catatan</label><input id="leaveNote" value="Disetujui oleh admin"></div>
        </div>
        <div class="actions">
          <button onclick="approveLeave()">POST Approve</button>
          <button class="alt" onclick="rejectLeave()">POST Reject</button>
        </div>
      </div>

      <div class="card">
        <h3>Buat Pengumuman</h3>
        <div class="grid">
          <div><label>Judul</label><input id="annTitle" value="Info Operasional"></div>
          <div><label>Target Role</label><select id="annRole"><option value="all">all</option><option value="employee">employee</option><option value="admin">admin</option></select></div>
        </div>
        <div><label>Isi</label><textarea id="annBody">Silakan update data absensi hari ini.</textarea></div>
        <div class="actions"><button onclick="createAnnouncement()">POST Announcement</button></div>
      </div>

      <div class="card">
        <h3>Upload Payroll Doc</h3>
        <div class="grid">
          <div><label>Employee ID</label><input id="payEmpId" value="EMP_DEMO_001"></div>
          <div><label>Email</label><input id="payEmail" value="demo@contoh.com"></div>
          <div><label>Bulan</label><input id="payMonth" value="April"></div>
          <div><label>Tahun</label><input id="payYear" value="2026"></div>
          <div><label>Nama File</label><input id="payFileName" value="slip-gaji-april-2026.pdf"></div>
          <div><label>File URL</label><input id="payUrl" value="https://example.com/slip-gaji-april-2026.pdf"></div>
        </div>
        <div class="actions"><button onclick="createPayrollDoc()">POST Payroll Doc</button></div>
      </div>

      <div class="card">
        <h3>Response</h3>
        <pre id="output">Siap. Pilih aksi admin untuk uji API.</pre>
        <p class="muted"><a href="./index.html">Kembali ke index</a></p>
      </div>
    </div>

    <script>
      function headers(withAdmin) {
        const h = { 'Content-Type': 'application/json' };
        if (withAdmin !== false) {
          h['x-user-email'] = document.getElementById('adminEmail').value.trim().toLowerCase();
          h['x-user-role'] = document.getElementById('adminRole').value.trim().toLowerCase();
        }
        return h;
      }
      function base() { return document.getElementById('baseUrl').value.trim().replace(/\/+$/, ''); }
      async function showResponse(resp) {
        const text = await resp.text();
        let body = text;
        try { body = JSON.parse(text); } catch (err) {}
        document.getElementById('output').textContent = JSON.stringify({ status: resp.status, ok: resp.ok, body: body }, null, 2);
      }
      async function callGet(path, withAdmin) {
        const resp = await fetch(base() + path, { method: 'GET', headers: headers(withAdmin) });
        await showResponse(resp);
      }
      async function callPost(path, payload, withAdmin) {
        const resp = await fetch(base() + path, { method: 'POST', headers: headers(withAdmin), body: JSON.stringify(payload || {}) });
        await showResponse(resp);
      }
      async function createEmployee() {
        await callPost('/api/admin/employees', {
          employee_id: document.getElementById('newEmpId').value.trim(),
          email: document.getElementById('newEmpEmail').value.trim().toLowerCase(),
          nama: document.getElementById('newEmpName').value.trim(),
          role: document.getElementById('newEmpRole').value.trim().toLowerCase()
        });
      }
      async function approveLeave() {
        await callPost('/api/admin/leaves/approve', {
          leave_id: document.getElementById('leaveIdAction').value.trim(),
          catatan_approver: document.getElementById('leaveNote').value.trim()
        });
      }
      async function rejectLeave() {
        await callPost('/api/admin/leaves/reject', {
          leave_id: document.getElementById('leaveIdAction').value.trim(),
          catatan_approver: document.getElementById('leaveNote').value.trim()
        });
      }
      async function createAnnouncement() {
        await callPost('/api/admin/announcements', {
          judul: document.getElementById('annTitle').value.trim(),
          isi: document.getElementById('annBody').value.trim(),
          target_role: document.getElementById('annRole').value.trim()
        });
      }
      async function createPayrollDoc() {
        await callPost('/api/admin/payroll-docs', {
          employee_id: document.getElementById('payEmpId').value.trim(),
          email: document.getElementById('payEmail').value.trim().toLowerCase(),
          bulan: document.getElementById('payMonth').value.trim(),
          tahun: document.getElementById('payYear').value.trim(),
          nama_file: document.getElementById('payFileName').value.trim(),
          file_url: document.getElementById('payUrl').value.trim()
        });
      }
    </script>
  </body>
</html>
