<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESS Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --primary: #4F46E5; --secondary: #6366F1; --primary-light: #EEF2FF;
      --bg: #F9FAFB; --card: #FFFFFF; --sidebar-bg: #F8FAFC; --border: #E5E7EB;
      --text-main: #111827; --text-sec: #6B7280;
      --success: #10B981; --success-bg: #D1FAE5;
      --warning: #F59E0B; --warning-bg: #FEF3C7; --danger: #EF4444; --danger-bg: #FEE2E2;
      --radius-lg: 20px; --radius-md: 16px; --radius-sm: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.04), 0 4px 10px -2px rgba(0,0,0,0.02);
      --shadow-hover: 0 14px 30px -4px rgba(79, 70, 229, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }
    .layout { display: flex; height: 100vh; }
    .sidebar { width: 240px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 20px; transition: transform 0.3s ease; z-index: 50; }
    .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding: 0 8px; }
    .logo img { height: 32px; width: auto; }
    .logo-text { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
    .sidebar-menu { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; }
    .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; text-decoration: none; color: var(--text-sec); border-radius: var(--radius-sm); font-weight: 500; font-size: 14px; transition: all 0.2s ease; cursor:pointer; border:none; background:transparent; width:100%; text-align:left; }
    .menu-item i { font-size: 20px; }
    .menu-item:hover { background-color: var(--border); color: var(--text-main); }
    .menu-item.active { background-color: var(--primary-light); color: var(--primary); }
    .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .header { min-height: 72px; display: flex; justify-content: space-between; align-items: center; padding: 10px clamp(16px, 2vw, 28px); background-color: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .search-bar { display: flex; align-items: center; gap: 10px; background-color: var(--bg); padding: 10px 16px; border-radius: 99px; border: 1px solid var(--border); width: min(320px, 42vw); transition: all 0.2s; }
    .search-bar:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background-color: var(--card); }
    .search-bar i { color: var(--text-sec); font-size: 18px; }
    .search-bar input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; font-family: inherit; }
    .header-right { display: flex; align-items: center; gap: clamp(10px, 1.8vw, 22px); flex-wrap: wrap; justify-content: flex-end; }
    .date-display { display: flex; align-items: center; gap: 8px; color: var(--text-sec); font-size: 14px; font-weight: 500; }
    .icon-btn { background: none; border: none; font-size: 22px; color: var(--text-sec); cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: background 0.2s; }
    .icon-btn:hover { background-color: var(--bg); color: var(--text-main); }
    .badge { position: absolute; top: 6px; right: 6px; background-color: #EF4444; color: white; font-size: 10px; font-weight: 700; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid var(--card); }
    .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); transition: background 0.2s; }
    .user-profile:hover { background-color: var(--bg); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-weight: 600; font-size: 14px; }
    .user-role { font-size: 12px; color: var(--text-sec); }
    
    .content-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: clamp(18px, 2vw, 28px); overflow-y: auto; height: calc(100vh - 80px); }
    .middle-col { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
    
    .greeting h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .greeting p { color: var(--text-sec); font-size: 15px; }
    .cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; align-items: stretch; }
    
    .card { background-color: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 22px; transition: box-shadow 0.3s ease, transform 0.3s ease; height: 100%; }
    .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    
    .stat-large { font-size: 42px; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 4px; letter-spacing: -0.02em; }
    .stat-label { font-size: 14px; color: var(--text-sec); font-weight: 500; }
    .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .status-badge.on-time { background-color: var(--success-bg); color: var(--success); }
    .status-badge.on-leave { background-color: var(--warning-bg); color: var(--warning); }
    .status-badge.danger { background-color: var(--danger-bg); color: var(--danger); }
    .status-badge.neutral { background-color: var(--border); color: var(--text-sec); }
    
    /* Generic Forms / Tables */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: var(--text-main); }
    input, select, textarea { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: #fff; color: var(--text-main); outline: none; font-family: inherit; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .table-wrap { width: 100%; overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--border); background: #fff; margin-top: 16px; }
    table { width: 100%; min-width: 680px; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid var(--border); padding: 14px 16px; text-align: left; font-size: 14px; vertical-align: middle; }
    th { background: var(--bg); font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; align-items: center; }
    .btn { display: inline-flex; align-items: center; gap: 8px; border: 0; border-radius: 99px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: .2s ease; max-width:100%; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--secondary); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.2); }
    .btn-secondary { background: var(--primary-light); color: var(--primary); }
    .btn-secondary:hover { background: #E0E7FF; transform: translateY(-1px); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #DC2626; transform: translateY(-1px); }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .muted { color: var(--text-sec); font-size: 14px; }
    .error { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; font-weight: 600; }
    .clean-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
    .clean-list li { display: flex; align-items: center; gap: 16px; }
    .icon-box { width: 44px; height: 44px; border-radius: var(--radius-sm); background-color: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .list-text { flex: 1; display: flex; flex-direction: column; }
    .list-title { font-weight: 600; font-size: 14px; color: var(--text-main); }
    .list-desc { font-size: 13px; color: var(--text-sec); }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(17,24,39,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; backdrop-filter: blur(4px); }
    .modal-card { width: min(860px, 96vw); max-height: 92vh; overflow: auto; background: #fff; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-lg); }
    .thumb-mini { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); background: var(--bg); }
    .thumb-mini-fallback { width: 48px; height: 48px; border-radius: 10px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); background:var(--bg); color:var(--text-sec); font-size:20px; }

    .team-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .admin-live-wrap { display:grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:14px; }
    .admin-live-box { border:1px solid var(--border); background:var(--bg); border-radius:14px; padding:14px; }
    .admin-live-label { font-size:12px; color:var(--text-sec); margin-bottom:6px; }
    .admin-live-value { font-size:24px; font-weight:800; color:var(--primary); line-height:1.1; letter-spacing:-0.02em; }
    .admin-break-chip { display:inline-flex; align-items:center; gap:8px; padding:7px 10px; border-radius:999px; background:var(--warning-bg); color:var(--warning); font-size:12px; font-weight:700; }
    .admin-break-dot { width:8px; height:8px; border-radius:50%; background:var(--warning); animation: adminPulse 1.1s ease infinite; }
    .admin-progress { height:10px; border-radius:999px; background:#e5e7eb; overflow:hidden; margin-top:10px; }
    .admin-progress > span { display:block; height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); width:0%; transition:width .5s ease; }
    .admin-ring-wrap { display:flex; justify-content:center; margin-bottom:14px; }
    .admin-ring { width:136px; height:136px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:conic-gradient(var(--primary) 0deg, #e5e7eb 0deg); transition:background .5s ease; }
    .admin-ring-inner { width:104px; height:104px; border-radius:50%; background:#fff; border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1.05; }
    .admin-ring-percent { font-size:26px; font-weight:800; color:var(--primary); letter-spacing:-0.03em; }
    .admin-ring-label { font-size:11px; color:var(--text-sec); font-weight:600; }
    .admin-anim-box { margin-bottom:14px; border:1px dashed var(--border); border-radius:14px; padding:16px; min-height:86px; display:flex; align-items:center; justify-content:center; text-align:center; background:#fff; }
    .admin-anim-box i { font-size:38px; color:#94a3b8; margin-bottom:8px; display:block; }
    .admin-anim-box .title { font-weight:700; color:var(--text-main); }
    .admin-anim-box .sub { font-size:12px; color:var(--text-sec); }
    .admin-att-top-actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .admin-aw { background:linear-gradient(180deg,var(--primary-light) 0%, var(--card) 100%); border-radius:var(--radius-lg); padding:20px; border:1px solid var(--border); }
    .admin-aw-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .admin-aw-header h3 { font-size:28px; color:var(--primary); font-weight:800; letter-spacing:-0.02em; margin-top:6px; }
    .admin-aw-title { font-size:28px; font-weight:800; letter-spacing:-0.02em; }
    .admin-aw-sub { font-size:11px; color:var(--text-sec); text-transform:uppercase; letter-spacing:0.08em; font-weight:700; margin-top:2px; }
    .admin-aw-main-btn { width:100%; border:none; border-radius:14px; background:var(--primary); color:#fff; padding:12px 14px; font-size:18px; font-weight:700; margin:8px 0 14px; cursor:pointer; }
    .admin-aw-status { margin:14px 0; border:1px dashed var(--border); border-radius:14px; min-height:92px; display:flex; align-items:center; justify-content:center; background:#fff; text-align:center; }
    .admin-aw-status i { font-size:38px; color:#94a3b8; margin-bottom:8px; display:block; }
    .admin-aw-status .title { font-weight:700; color:var(--text-main); }
    .admin-aw-status .sub { font-size:12px; color:var(--text-sec); }
    .admin-aw-info { display:flex; flex-direction:column; gap:12px; margin-bottom:14px; }
    .admin-aw-info-box { display:flex; align-items:center; gap:12px; background:var(--card); padding:13px; border-radius:12px; border:1px solid var(--border); }
    .admin-aw-info-box i { font-size:22px; color:var(--primary); background:var(--primary-light); padding:8px; border-radius:10px; }
    .admin-aw-break { display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
    .admin-aw-progress { height:10px; border-radius:999px; background:#e5e7eb; overflow:hidden; }
    .admin-aw-progress > span { display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--primary),var(--secondary)); transition:width .5s ease; }
    @keyframes adminPulse { 0%{ transform:scale(1); opacity:.95; } 50%{ transform:scale(1.5); opacity:.45; } 100%{ transform:scale(1); opacity:.95; } }
    
    @media (max-width: 992px) { .sidebar { position: fixed; transform: translateX(-100%); height: 100vh; box-shadow: var(--shadow-lg); } .sidebar.open { transform: translateX(0); } .search-bar { display: none; } .table-wrap { margin-top: 12px; } table { min-width: 620px; } }
    @media (max-width: 768px) { .content-grid { padding: 16px; gap:16px; } .header-right .date-display { display: none; } .actions .btn { width:100%; justify-content:center; } table { min-width: 560px; } th,td { padding:12px; font-size:13px; } }
  </style>
</head>
<body>
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><img src="https://trendhorizone.id/wp-content/uploads/2024/07/174135616958657596.png" alt="Logo"></div>
        <button class="mobile-close" onclick="document.getElementById('sidebar').classList.remove('open')" style="display:none;"><i class="ph ph-x"></i></button>
      </div>
      <nav class="sidebar-menu">
        <button class="menu-item active" onclick="navTo('home', this); loadSummary()"><i class="ph ph-squares-four"></i><span>Dashboard</span></button>
        <button class="menu-item" onclick="navTo('emp', this); loadAllEmployees()"><i class="ph ph-users"></i><span>Employees</span></button>
        <button class="menu-item" onclick="navTo('leave', this); loadLeaveManagement()"><i class="ph ph-calendar-blank"></i><span>Leave Approvals</span></button>
        <button class="menu-item" onclick="navTo('sched', this); loadMonthlyScheduleAdmin()"><i class="ph ph-calendar-check"></i><span>Monthly Schedule</span></button>
        <button class="menu-item" onclick="navTo('att', this); loadTodayAttendance()"><i class="ph ph-clock"></i><span>Attendance Log</span></button>
        <button class="menu-item" onclick="navTo('rep', this); loadEmployeeReports()"><i class="ph ph-chart-bar"></i><span>Reports</span></button>
        <button class="menu-item" onclick="navTo('ops', this); loadOperationsIntelligenceCenter()"><i class="ph ph-brain"></i><span>Operations</span></button>
        <button class="menu-item" onclick="navTo('tower', this); loadWorkforceControlTower()"><i class="ph ph-command"></i><span>Control Tower</span></button>
        <button class="menu-item" onclick="navTo('incident', this); loadIncidentTimeline()"><i class="ph ph-siren"></i><span>Incident Timeline</span></button>
        <button class="menu-item" onclick="navTo('master', this); loadMasterDataHub()"><i class="ph ph-database"></i><span>Master Data</span></button>
      </nav>
    </aside>

    <!-- MAIN -->
    <div class="main-wrapper">
      <header class="header">
        <div class="header-left">
          <button class="icon-btn" onclick="document.getElementById('sidebar').classList.add('open')" style="display:none;" id="mobileToggle"><i class="ph ph-list"></i></button>
          <div class="search-bar"><i class="ph ph-magnifying-glass"></i><input type="text" placeholder="Search anything..."></div>
        </div>
        <div class="header-right">
          <div class="date-display"><i class="ph ph-calendar"></i><span id="header_date">Today</span></div>
          <button class="icon-btn" onclick="loadAdminNotifications()"><i class="ph ph-bell"></i><span class="badge" id="notif_badge" style="display:none;">0</span></button>
          <button class="icon-btn" onclick="logoutSession()"><i class="ph ph-sign-out"></i></button>
          <div class="user-profile">
            <div class="avatar" id="header_avatar">A</div>
            <div class="user-info"><span class="user-name" id="header_name">Admin</span><span class="user-role" id="header_role">Superadmin</span></div>
          </div>
        </div>
      </header>

      <div class="content-grid" id="main_content_grid">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <script>
    function navTo(id, el){ document.querySelectorAll('.menu-item').forEach(e=>e.classList.remove('active')); el.classList.add('active'); if(window.innerWidth<=992) document.getElementById('sidebar').classList.remove('open'); }
    if(window.innerWidth<=992) { document.getElementById('mobileToggle').style.display='block'; document.querySelector('.mobile-close').style.display='block'; }
    document.getElementById('header_date').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'2-digit', month:'short'});

    let adminStatusTimer=null;
    let adminPersonalTimer=null;
    function safe(v){ return v===null||v===undefined?'':v; }
    function escapeHtml(v){ return String(safe(v)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function clearAdminStatusTicker(){ if(adminStatusTimer){ clearInterval(adminStatusTimer); adminStatusTimer=null; } if(adminPersonalTimer){ clearInterval(adminPersonalTimer); adminPersonalTimer=null; } }
    
    function setContent(html){
        clearAdminStatusTicker();
        document.getElementById('main_content_grid').innerHTML = `<main class="middle-col">${html}</main>`;
    }
    
    function setLoading(t){ setContent(`<div class="card"><h3>${escapeHtml(t||'Loading...')}</h3><p class="muted">Please wait a moment.</p></div>`); }
    function renderError(m){ return `<div class="card"><div class="error">${escapeHtml(m||'Error occurred.')}</div></div>`; }
    function normalizeStatusBadge(status){ const s=String(safe(status)).trim().toLowerCase(); if(s==='approved'||s==='active'||s==='true'||s==='hadir') return `<span class="status-badge on-time">${escapeHtml(status)}</span>`; if(s==='rejected'||s==='inactive'||s==='false') return `<span class="status-badge danger">${escapeHtml(status)}</span>`; if(s==='pending'||s==='terlambat') return `<span class="status-badge on-leave">${escapeHtml(status)}</span>`; return `<span class="status-badge neutral">${escapeHtml(status||'-')}</span>`; }
    function moneyId(n){ return 'Rp ' + Number(n||0).toLocaleString('id-ID'); }
    function parseRupiahInput(v){
      const clean=String(v||'').replace(/[^\d,-]/g,'').replace(',', '.');
      const n=Number(clean||0);
      return Number.isFinite(n)?n:0;
    }
    function rupiahPlain(n){ return Number(n||0).toLocaleString('id-ID'); }
    function attachRupiahInput(id){
      const el=document.getElementById(id);
      if(!el||el.__rupiahAttached) return;
      el.__rupiahAttached=true;
      el.type='text';
      const render=function(){ const num=parseRupiahInput(el.value); el.value = num ? rupiahPlain(num) : ''; };
      el.addEventListener('blur', render);
      el.addEventListener('focus', function(){ el.value=String(parseRupiahInput(el.value)||''); });
      if(String(el.value||'').trim()) render();
    }
    function payrollMoneyInputIds(){
      return ['pay_gaji_pokok','pay_tunjangan','pay_transport_allowance','pay_meal_allowance','pay_lembur','pay_bonus','pay_attendance_allowance','pay_thr','pay_pot_pajak','pay_bpjs_kes','pay_bpjs_ket','pay_penalty_deduction','pay_late_deduction','pay_absence_deduction','pay_pot_lain','pay_ump_jam','pay_max_ks','pay_max_jp'];
    }
    function initPayrollMoneyInputs(){
      payrollMoneyInputIds().forEach(function(id){ attachRupiahInput(id); });
    }
    function getPayNum(id){ return parseRupiahInput((document.getElementById(id)||{}).value||0); }
    function setPayNum(id,n){ const el=document.getElementById(id); if(!el) return; el.value = Number(n||0)?rupiahPlain(Number(n||0)):'0'; }
    function applyPayrollQuickFill(){
      const base=getPayNum('pay_gaji_pokok');
      const maxKs=getPayNum('pay_max_ks')||12000000;
      const maxJp=getPayNum('pay_max_jp')||10300000;
      const ksBase=Math.min(Math.max(base,base),maxKs);
      const jpBase=Math.min(base,maxJp);
      setPayNum('pay_bpjs_kes', Math.round(ksBase*0.01));
      setPayNum('pay_bpjs_ket', Math.round(base*0.02));
      setPayNum('pay_pot_pajak', Math.round(base*0.05));
      setPayNum('pay_penalty_deduction', 0);
      setPayNum('pay_late_deduction', 0);
      setPayNum('pay_absence_deduction', 0);
      setPayNum('pay_pot_lain', 0);
    }
    function resetPayrollNominal(){
      payrollMoneyInputIds().forEach(function(id){ if(id==='pay_max_ks') return setPayNum(id,12000000); if(id==='pay_max_jp') return setPayNum(id,10300000); setPayNum(id,0); });
    }
    function payrollInputMap(){
      return {
        'basic salary':'pay_gaji_pokok',
        'gaji pokok':'pay_gaji_pokok',
        'allowance':'pay_tunjangan',
        'tunjangan':'pay_tunjangan',
        'transport allowance':'pay_transport_allowance',

    function formatDateTimeDisplay(value){ if(!value) return ''; const d=new Date(value); if(isNaN(d.getTime())) return String(value); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); }

    function nowHmsWIB(){ const p=new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date()).reduce(function(a,x){ if(x&&x.type) a[x.type]=x.value; return a; },{}); return String(p.hour||'00')+':'+String(p.minute||'00')+':'+String(p.second||'00'); }
    function hmsToSec(v){ const s=String(v||'').trim(); const m=s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/); if(!m) return 0; return Number(m[1]||0)*3600+Number(m[2]||0)*60+Number(m[3]||0); }
    function isValidHms(v){ return /^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.test(String(v||'').trim()); }
    function diffSecClock(a,b){ if(!isValidHms(a)||!isValidHms(b)) return 0; const x=hmsToSec(a), y=hmsToSec(b); return y>=x?(y-x):((24*3600-x)+y); }
    function secToDigital(total){ const t=Math.max(0,Math.floor(Number(total||0))); const h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
    
    function startAdminStatusTicker(){
      const rows=[].slice.call(document.querySelectorAll('tr[data-live-row="1"]'));
      if(!rows.length) return;
      const tick=function(){
        const now=nowHmsWIB();
        rows.forEach(function(tr){
          const masuk=String(tr.getAttribute('data-masuk')||'');
          const keluar=String(tr.getAttribute('data-keluar')||'');
          const breakSec=Number(tr.getAttribute('data-break-seconds')||0);
          const breakActive=String(tr.getAttribute('data-break-active')||'')==='1';
          const breakStart=String(tr.getAttribute('data-break-start')||'');
          if(!masuk) return;
          let gross=keluar?diffSecClock(masuk,keluar):diffSecClock(masuk,now);
          let b=breakSec;
          if(!keluar && breakActive && breakStart){ b+=diffSecClock(breakStart,now); }
          const eff=Math.max(0,gross-b);
          const workEl=tr.querySelector('[data-cell=\"work\"]'); if(workEl) workEl.textContent=secToDigital(eff);
          const breakEl=tr.querySelector('[data-cell=\"break\"]'); if(breakEl) breakEl.textContent=secToDigital(b);
        });
      };
      tick();
      adminStatusTimer=setInterval(tick,1000);
    }
    function startAdminPersonalTicker(data){
      const workEl=document.getElementById('admin_aw_digital')||document.getElementById('admin_work_timer');
      const breakEl=document.getElementById('admin_aw_break')||document.getElementById('admin_break_timer');
      const progressEl=document.getElementById('admin_aw_progress')||document.getElementById('admin_shift_progress');
      const ring=document.getElementById('admin_shift_ring');
      const ringPercent=document.getElementById('admin_shift_percent');
      const chip=document.getElementById('admin_aw_break_chip')||document.getElementById('admin_break_chip');
      if(!workEl||!breakEl||!progressEl) return;
      const masuk=String(data&&data.jam_masuk||'');
      const keluar=String(data&&data.jam_keluar||'');
      const breakActive=!!(data&&data.break_active);
      const breakStart=String(data&&data.break_active_start||'');
      const baseBreakSec=Math.max(0,Number(data&&data.break_total_seconds||0));
      const targetSec=8*3600;
      const tick=function(){
        if(!masuk){
          workEl.textContent='00:00:00';
          breakEl.textContent='00:00:00';
          progressEl.style.width='0%';
          if(ring&&ringPercent){ ring.style.background='conic-gradient(var(--primary) 0deg, #e5e7eb 0deg)'; ringPercent.textContent='0%'; }
          return;
        }
        const now=nowHmsWIB();
        let gross=keluar?diffSecClock(masuk,keluar):diffSecClock(masuk,now);
        let breakSec=baseBreakSec;
        if(!keluar && breakActive && breakStart){ breakSec += diffSecClock(breakStart,now); }
        const eff=Math.max(0,gross-breakSec);
        const percent=Math.min(100,Math.max(0,Math.round((eff/targetSec)*100)));
        workEl.textContent=secToDigital(eff);
        breakEl.textContent=secToDigital(breakSec);
        progressEl.style.width=String(percent)+'%';
        if(ring&&ringPercent){ ring.style.background='conic-gradient(var(--primary) '+String(percent*3.6)+'deg, #e5e7eb 0deg)'; ringPercent.textContent=String(percent)+'%'; }
      };
      if(chip) chip.style.display = breakActive && !keluar ? 'inline-flex' : 'none';
      tick();
      if(!keluar){ adminPersonalTimer=setInterval(function(){ tick(); },1000); }
    }

    let hrKpiData = null;

    function num(v){ const n=Number(v||0); return isNaN(n)?0:n; }
    function compactDates(arr){ const a=(arr||[]); if(a.length<=14) return a; const step=Math.ceil(a.length/14); return a.filter(function(_,i){ return i%step===0 || i===a.length-1; }); }
    function renderLineChartSvg(series,labels,opts){
      const width=920, height=260, padL=44, padR=16, padT=14, padB=28;
      const w=width-padL-padR, h=height-padT-padB;
      const xStep=(labels.length<=1)?w:(w/(labels.length-1));
      const all=[]; (series||[]).forEach(function(s){ (s.values||[]).forEach(function(v){ all.push(num(v)); }); });
      const max=Math.max(1,Math.max.apply(null,all));
      const y=function(v){ return padT + (h - (num(v)/max)*h); };
      const x=function(i){ return padL + i*xStep; };
      const grid=[0,.25,.5,.75,1].map(function(r){ const yy=padT + h*r; const val=Math.round(max*(1-r)); return '<line x1="'+padL+'" y1="'+yy+'" x2="'+(padL+w)+'" y2="'+yy+'" stroke="var(--border)" stroke-width="1"></line><text x="6" y="'+(yy+4)+'" fill="var(--text-sec)" font-size="11">'+val+'</text>'; }).join('');
      const fnName=opts&&opts.onPointClick?String(opts.onPointClick):'';
      const paths=(series||[]).map(function(s){
        const points=(s.values||[]).map(function(v,i){ return x(i)+','+y(v); }).join(' ');
        const circles=(s.values||[]).map(function(v,i){
          const date=String(labels[i]||'');
          const click=fnName&&date?' onclick="'+fnName+'(\''+escapeHtml(date)+'\')" style="cursor:pointer;" ':'';
          return '<circle cx="'+x(i)+'" cy="'+y(v)+'" r="3.5" fill="'+s.color+'"'+click+'><title>'+escapeHtml((s.name||'')+' '+date+' : '+String(v||0))+'</title></circle>';
        }).join('');
        return '<polyline points="'+points+'" fill="none" stroke="'+s.color+'" stroke-width="2.5"></polyline>'+circles;
      }).join('');
      const tickLabels=compactDates(labels).map(function(lbl){ const idx=labels.indexOf(lbl); return '<text x="'+x(idx)+'" y="'+(height-8)+'" fill="var(--text-sec)" font-size="11" text-anchor="middle">'+escapeHtml(lbl.slice(5))+'</text>'; }).join('');
      const legends=(series||[]).map(function(s,i){ return '<span style="display:inline-flex;align-items:center;margin-right:14px;font-size:12px;font-weight:600;"><span style="display:inline-block;width:12px;height:12px;border-radius:4px;background:'+s.color+';margin-right:6px;"></span>'+escapeHtml(s.name)+'</span>'; }).join('');
      return '<div style="margin-bottom:12px;">'+legends+'</div><div style="overflow-x:auto;"><svg viewBox="0 0 '+width+' '+height+'" style="width:100%;min-width:760px;background:var(--bg);border-radius:var(--radius-sm);">'+grid+paths+tickLabels+'</svg></div>';
    }
    function renderBarChartSvg(rows){
      const width=920, height=280, padL=50, padR=16, padT=14, padB=56;
      const w=width-padL-padR, h=height-padT-padB;
      const data=(rows||[]).slice(0,10);
      const max=Math.max(1,Math.max.apply(null,data.map(function(r){ return num(r.late_count); })));
      const barW=(w/Math.max(1,data.length))*0.62;
      const gap=(w/Math.max(1,data.length))*0.38;
      const bars=data.map(function(r,i){
        const v=num(r.late_count), bh=(v/max)*h, x=padL+i*(barW+gap)+(gap*0.5), y=padT+(h-bh);
        const empId=String(r.employee_id||'');
        const click=empId?' onclick="focusLateEmployee(\''+escapeHtml(empId)+'\')" style="cursor:pointer;" ':'';
        return '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="4" fill="var(--warning)"'+click+'><title>'+escapeHtml(empId+' : '+v)+'</title></rect>'
          +'<text x="'+(x+barW/2)+'" y="'+(y-6)+'" text-anchor="middle" fill="var(--warning)" font-size="11" font-weight="700">'+v+'</text>'
          +'<text x="'+(x+barW/2)+'" y="'+(height-30)+'" text-anchor="middle" fill="var(--text-sec)" font-size="10">'+escapeHtml(String(r.employee_id||'-'))+'</text>';
      }).join('');
      return '<div style="overflow-x:auto;"><svg viewBox="0 0 '+width+' '+height+'" style="width:100%;min-width:760px;background:var(--bg);border-radius:var(--radius-sm);"><line x1="'+padL+'" y1="'+(padT+h)+'" x2="'+(padL+w)+'" y2="'+(padT+h)+'" stroke="var(--border)"></line>'+bars+'</svg></div>';
    }
    function renderLateHeatmapMatrix(rows){
      const data=rows||[];
      const dates=Array.from(new Set(data.map(function(r){ return String(r.date||''); }))).sort();
      const cols=dates.slice(Math.max(0,dates.length-14));
      const divisions=Array.from(new Set(data.map(function(r){ return String(r.divisi||'Tanpa Divisi'); }))).sort();
      const map={}; data.forEach(function(r){ map[String(r.divisi||'Tanpa Divisi')+'|'+String(r.date||'')] = r; });
      const head='<tr><th>Divisi</th>'+cols.map(function(d){ return '<th>'+escapeHtml(String(d||'').slice(5))+'</th>'; }).join('')+'</tr>';
      const body=divisions.map(function(div){
        const cells=cols.map(function(d){
          const row=map[div+'|'+d]||{ late_rate:0, late_records:0, attendance_records:0 };
          const rate=Number(row.late_rate||0);
          const opacity=Math.min(0.9,Math.max(0.08,rate/100));
          const bg='rgba(245,158,11,'+opacity.toFixed(2)+')';
          const label=(Number(row.attendance_records||0)>0)?(String(rate)+'%'):'-';
          const tip='Terlambat: '+String(row.late_records||0)+' / '+String(row.attendance_records||0);

        }).join('');

    function summarizeHeatmapWarnings(rows, threshold){
      const t=Number(threshold||20);
      const data=(rows||[]).filter(function(r){ return Number(r.attendance_records||0)>0 && Number(r.late_rate||0)>=t; });
      const divisionMap={};
      data.forEach(function(r){
        const key=String(r.divisi||'Tanpa Divisi');
        if(!divisionMap[key]) divisionMap[key]={ divisi:key, days:0, worst_rate:0 };
        divisionMap[key].days += 1;
        if(Number(r.late_rate||0)>Number(divisionMap[key].worst_rate||0)) divisionMap[key].worst_rate=Number(r.late_rate||0);
      });
      const list=Object.values(divisionMap).sort(function(a,b){
        if(Number(b.days||0)!==Number(a.days||0)) return Number(b.days||0)-Number(a.days||0);
        return Number(b.worst_rate||0)-Number(a.worst_rate||0);
      });
      return { threshold:t, rows:data, divisions:list };
    }

    function autoPayrollFileName(employeeId){
      const now=new Date();
      const prev=new Date(now.getFullYear(), now.getMonth()-1, 1);
      const bulan=prev.toLocaleString('id-ID',{month:'long'});
      const tahun=String(now.getFullYear());
      const row=(payrollEmployeeOptionsCache||[]).find(function(r){ return String(r.employee_id||'')===String(employeeId||''); }) || null;

      return 'Slip Gaji ' + bulan + ' ' + tahun + ' - ' + nama;

tan</label><input id="pay_bpjs_kes" type="number" min="0" value="0"></div><div class="form-group"><label>BPJS Ketenagakerjaan</label><input id="pay_bpjs_ket" type="number" min="0" value="0"></div><div class="form-group"><label>Penalty / Deduction</label><input id="pay_penalty_deduction" type="number" min="0" value="0"></div><div class="form-group"><label>Late Deduction</label><input id="pay_late_deduction" type="number" min="0" value="0"></div><div class="form-group"><label>Absence Deduction</label><input id="pay_absence_deduction" type="number" min="0" value="0"></div><div class="form-group"><label>Other Deduction</label><input id="pay_pot_lain" type="number" min="0" value="0"></div></div><div class="form-group"><label>Keterangan</label><textarea id="pay_keterangan" placeholder="Opsional"></textarea></div></div><div><div class="team-header"><h3 style="font-size:16px;font-weight:700;">Karyawan Belum Ada Slip</h3></div><ul class="clean-list">'+missingList+'</ul></div></div><div class="table-wrap"><table><thead><tr><th>Doc ID</th><th>Employee</th><th>Bulan</th><th>Tahun</th><th>Pendapatan</th><th>Potongan</th><th>Take Home Pay</th><th>Uploaded</th><th>Aksi</th></tr></thead><tbody>'+tableRows+'</tbody></table></div></div>'));
      }catch(err){ setContent(renderError(err.message)); }
    }
    async function submitPayrollDoc(){
      try{
        const employeeId=String((document.getElementById('pay_emp_id')||{}).value||'').trim();
        const email=String((document.getElementById('pay_email')||{}).value||'').trim();
        const bulan=String((document.getElementById('pay_bulan')||{}).value||'').trim();
        const tahun=String((document.getElementById('pay_tahun')||{}).value||'').trim();
        const namaFile=String((document.getElementById('pay_nama_file')||{}).value||'').trim();
        const fileUrl=String((document.getElementById('pay_file_url')||{}).value||'').trim();
        const keterangan=String((document.getElementById('pay_keterangan')||{}).value||'').trim();
        if(!employeeId||!bulan||!tahun) throw new Error('Employee, bulan, dan tahun wajib diisi.');
        await api('/api/admin/payroll-docs','POST',{
          employee_id:employeeId,email:email,bulan:bulan,tahun:tahun,nama_file:(namaFile||autoPayrollFileName(employeeId)),file_url:fileUrl,keterangan:keterangan,
          gaji_pokok:getPayNum('pay_gaji_pokok'),
          tunjangan:getPayNum('pay_tunjangan'),
          transport_allowance:getPayNum('pay_transport_allowance'),
          meal_allowance:getPayNum('pay_meal_allowance'),
          lembur:getPayNum('pay_lembur'),
          bonus:getPayNum('pay_bonus'),
          attendance_allowance:getPayNum('pay_attendance_allowance'),
          thr:getPayNum('pay_thr'),
          potongan_pajak:getPayNum('pay_pot_pajak'),
          bpjs_kesehatan:getPayNum('pay_bpjs_kes'),
          bpjs_ketenagakerjaan:getPayNum('pay_bpjs_ket'),
          penalty_deduction:getPayNum('pay_penalty_deduction'),
          late_deduction:getPayNum('pay_late_deduction'),
          absence_deduction:getPayNum('pay_absence_deduction'),
          potongan_lain:getPayNum('pay_pot_lain'),
          apply_bpjs_kesehatan: !!((document.getElementById('pay_apply_bpjs_kes')||{}).checked),
          apply_bpjs_ketenagakerjaan: !!((document.getElementById('pay_apply_bpjs_ketenaga')||{}).checked),
          apply_tax: !!((document.getElementById('pay_apply_tax')||{}).checked),
          UMP_JAM: getPayNum('pay_ump_jam'),
          MAX_KS: getPayNum('pay_max_ks')||12000000,
          MAX_JP: getPayNum('pay_max_jp')||10300000,
          tax_rate: Number((document.getElementById('pay_tax_rate')||{}).value||0)
        });
        await loadPayrollDocs();
      }catch(err){ setContent(renderError(err.message)); }
    }
    async function loadAnnouncements(){ try{ setLoading(); const rows=await api('/api/admin/announcements?limit=200'); setContent('<div class="card"><div class="team-header"><h3 style="font-size:20px;font-weight:700;">Announcements</h3><div class="actions"><button class="btn btn-primary" onclick="loadAddAnnouncementForm()"><i class="ph ph-plus"></i> Add New</button><button class="btn btn-secondary" onclick="loadMasterDataHub()">Back</button></div></div><div class="table-wrap"><table><thead><tr><th>Judul</th><th>Target</th><th>Published</th><th>Aktif</th><th>Aksi</th></tr></thead><tbody>'+((rows||[]).map(function(r){return '<tr><td><div style="font-weight:600;color:var(--text-main);">'+escapeHtml(r.judul||'-')+'</div><div style="font-size:12px;color:var(--text-sec);">'+escapeHtml(r.announcement_id||'-')+'</div></td><td>'+escapeHtml(r.target_role||'all')+'</td><td>'+escapeHtml(formatDateTimeDisplay(r.published_at)||'-')+'</td><td>'+normalizeStatusBadge(String(r.is_active))+'</td><td><div class="actions" style="margin-top:0;"><button class="btn btn-secondary" onclick="loadEditAnnouncementForm(\''+escapeHtml(r.announcement_id||'')+'\')">Edit</button><button class="btn btn-secondary" onclick="toggleAnnouncementActive(\''+escapeHtml(r.announcement_id||'')+'\','+(String(r.is_active).toLowerCase()==='true'?'true':'false')+')">'+(String(r.is_active).toLowerCase()==='true'?'Nonaktifkan':'Aktifkan')+'</button></div></td></tr>';}).join('')||'<tr><td colspan="5">Tidak ada data</td></tr>')+'</tbody></table></div></div>'); }catch(err){ setContent(renderError(err.message)); } }
    function loadAddAnnouncementForm(){ setContent('<div class="card"><div class="team-header"><h3 style="font-size:20px;font-weight:700;">Tambah Pemberitahuan</h3></div><div class="form-group"><label>Judul</label><input id="ann_judul"></div><div class="form-group"><label>Target Role</label><select id="ann_target"><option value="all">all</option><option value="employee">employee</option><option value="admin">admin</option></select></div><div class="form-group"><label>Isi</label><textarea id="ann_isi"></textarea></div><div class="actions"><button class="btn btn-primary" onclick="submitAddAnnouncement()">Simpan</button><button class="btn btn-secondary" onclick="loadAnnouncements()">Batal</button></div></div>'); }
    async function submitAddAnnouncement(){ try{ await api('/api/admin/announcements','POST',{judul:(document.getElementById('ann_judul')||{}).value||'',target_role:(document.getElementById('ann_target')||{}).value||'all',isi:(document.getElementById('ann_isi')||{}).value||''}); await loadAnnouncements(); }catch(err){ setContent(renderError(err.message)); } }
    async function loadEditAnnouncementForm(id){ try{ setLoading(); const rows=await api('/api/admin/announcements?limit=500'); const row=(rows||[]).find(function(x){ return String(x.announcement_id||'')===String(id||''); }); if(!row) throw new Error('Announcement tidak ditemukan.'); setContent('<div class="card"><div class="team-header"><h3 style="font-size:20px;font-weight:700;">Edit Pemberitahuan</h3></div><div class="form-group"><label>ID</label><input id="ann_edit_id" value="'+escapeHtml(row.announcement_id||'')+'" readonly></div><div class="form-group"><label>Judul</label><input id="ann_edit_judul" value="'+escapeHtml(row.judul||'')+'"></div><div class="form-group"><label>Target Role</label><select id="ann_edit_target"><option value="all" '+(String(row.target_role||'all')==='all'?'selected':'')+'>all</option><option value="employee" '+(String(row.target_role||'')==='employee'?'selected':'')+'>employee</option><option value="admin" '+(String(row.target_role||'')==='admin'?'selected':'')+'>admin</option></select></div><div class="form-group"><label>Isi</label><textarea id="ann_edit_isi">'+escapeHtml(row.isi||'')+'</textarea></div><div class="form-group"><label>Status Aktif</label><select id="ann_edit_active"><option value="true" '+(String(row.is_active).toLowerCase()==='true'?'selected':'')+'>true</option><option value="false" '+(String(row.is_active).toLowerCase()!=='true'?'selected':'')+'>false</option></select></div><div class="actions"><button class="btn btn-primary" onclick="submitEditAnnouncement()"><i class="ph ph-check"></i> Update</button><button class="btn btn-secondary" onclick="loadAnnouncements()">Batal</button></div></div>'); }catch(err){ setContent(renderError(err.message)); } }
    async function submitEditAnnouncement(){ try{ await api('/api/admin/announcements','PATCH',{announcement_id:(document.getElementById('ann_edit_id')||{}).value||'',judul:(document.getElementById('ann_edit_judul')||{}).value||'',target_role:(document.getElementById('ann_edit_target')||{}).value||'all',isi:(document.getElementById('ann_edit_isi')||{}).value||'',is_active:String((document.getElementById('ann_edit_active')||{}).value||'true')==='true'}); await loadAnnouncements(); }catch(err){ setContent(renderError(err.message)); } }
    async function toggleAnnouncementActive(id,currentActive){ try{ await api('/api/admin/announcements','PATCH',{announcement_id:String(id||''),is_active:!currentActive}); await loadAnnouncements(); }catch(err){ setContent(renderError(err.message)); } }

    async function loadAdminNotifications(){ try{ setLoading(); const summary=await api('/api/admin/notifications/leave/summary'); const rows=await api('/api/admin/notifications/leave'); setContent('<div class="cards-row" style="margin-bottom:24px;"><div class="card"><div class="stat-label">Leave Request Baru</div><div class="stat-large" style="color:var(--warning);">'+escapeHtml(summary.unread_leave_requests||0)+'</div></div><div class="card"><div class="stat-label">Total Unread</div><div class="stat-large">'+escapeHtml(summary.total_unread||0)+'</div></div></div><div class="card"><div class="team-header"><h3 style="font-size:20px;font-weight:700;">Notifikasi Admin</h3><div class="actions"><button class="btn btn-secondary" onclick="markAllAdminNotificationsSeen()"><i class="ph ph-check-double"></i> Mark All Read</button></div></div><ul class="clean-list">'+((rows||[]).map(function(r){return '<li><div class="icon-box" style="background:var(--warning-bg);color:var(--warning);"><i class="ph ph-bell"></i></div><div class="list-text"><span class="list-title">'+escapeHtml(r.title||'Notifikasi')+'</span><span class="list-desc">'+escapeHtml(formatDateTimeDisplay(r.date_value||''))+' - '+escapeHtml(r.message||'')+'</span></div></li>';}).join('')||'<li>Tidak ada notifikasi</li>')+'</ul></div>'); }catch(err){ setContent(renderError(err.message)); } }
    async function markAllAdminNotificationsSeen(){ try{ await api('/api/admin/notifications/leave/mark-seen','POST',{}); await loadAdminNotifications(); }catch(err){ setContent(renderError(err.message)); } }

    async function initAdmin(){ if(!(await ensureSessionLogin())) return; observePayrollForm(); loadSummary(); }
    initAdmin();
  </script>
