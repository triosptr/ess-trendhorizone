<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee API Preview</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f3f6fb; margin: 0; padding: 20px; color: #0f172a; }
      .wrap { max-width: 1080px; margin: 0 auto; }
      .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 6px 18px rgba(15,23,42,.08); margin-bottom: 14px; }
      h1,h2,h3 { margin: 0 0 10px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 12px; }
      label { display: block; font-size: 12px; color: #475569; margin-bottom: 4px; }
      input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 10px; font-size: 14px; }
      textarea { min-height: 80px; resize: vertical; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      button { border: 0; border-radius: 8px; padding: 9px 12px; background: #2563eb; color: #fff; cursor: pointer; font-weight: 700; }
      button.alt { background: #334155; }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; background: #0b1020; color: #dbeafe; padding: 12px; border-radius: 8px; max-height: 320px; overflow: auto; }
      .muted { color: #64748b; font-size: 13px; }
      a { color: #1d4ed8; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Employee Preview (Vercel API + Supabase)</h1>
        <p class="muted">Gunakan halaman ini untuk menguji endpoint karyawan tanpa Apps Script.</p>
        <div class="grid">
          <div>
            <label>Base URL API</label>
            <input id="baseUrl" value="https://ess-2026-trendhorizone-id.vercel.app">
          </div>
          <div>
            <label>x-user-email</label>
            <input id="userEmail" value="demo@contoh.com">
          </div>
          <div>
            <label>x-employee-id</label>
            <input id="employeeId" value="EMP_DEMO_001">
          </div>
          <div>
            <label>x-user-role</label>
            <select id="userRole">
              <option value="employee" selected>employee</option>
              <option value="admin">admin</option>
              <option value="superadmin">superadmin</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button onclick="callGet('/api/health', false)">Health</button>
          <button onclick="callGet('/api/me/profile')">My Profile</button>
          <button onclick="callGet('/api/me/dashboard-summary')">Dashboard Summary</button>
          <button onclick="callGet('/api/me/attendance/config')">Attendance Config</button>
          <button onclick="callGet('/api/me/attendance/today')">Attendance Today</button>
          <button onclick="callGet('/api/me/attendance/history?limit=20')">Attendance History</button>
          <button onclick="callGet('/api/leave-types/active', false)">Leave Types</button>
          <button onclick="callGet('/api/me/leaves')">My Leaves</button>
          <button onclick="callGet('/api/me/announcements')">Announcements</button>
          <button onclick="callGet('/api/me/payroll-docs')">Payroll Docs</button>
          <button onclick="callGet('/api/me/notifications/summary')">Notif Summary</button>
          <button onclick="callGet('/api/me/notifications')">Notif List</button>
        </div>
      </div>

      <div class="card">
        <h3>Check In / Check Out</h3>
        <div class="grid">
          <div>
            <label>Lokasi</label>
            <input id="attLokasi" value="Office">
          </div>
          <div>
            <label>Work Mode</label>
            <select id="attWorkMode">
              <option value="office" selected>office</option>
              <option value="wfh">wfh</option>
            </select>
          </div>
          <div>
            <label>Status</label>
            <input id="attStatus" value="Hadir">
          </div>
          <div>
            <label>Catatan</label>
            <input id="attCatatan" value="">
          </div>
        </div>
        <div class="actions">
          <button onclick="doCheckIn()">POST Check In</button>
          <button class="alt" onclick="doCheckOut()">POST Check Out</button>
        </div>
      </div>

      <div class="card">
        <h3>Ajukan Cuti</h3>
        <div class="grid">
          <div>
            <label>Jenis Cuti</label>
            <input id="leaveType" value="Cuti Tahunan">
          </div>
          <div>
            <label>Tanggal Mulai</label>
            <input id="leaveStart" type="date">
          </div>
          <div>
            <label>Tanggal Selesai</label>
            <input id="leaveEnd" type="date">
          </div>
          <div>
            <label>Jumlah Hari</label>
            <input id="leaveDays" type="number" value="1">
          </div>
        </div>
        <div>
          <label>Alasan</label>
          <textarea id="leaveReason">Keperluan keluarga</textarea>
        </div>
        <div class="actions">
          <button onclick="submitLeave()">POST Leave Request</button>
          <button class="alt" onclick="markNotif('all')">Mark Notif Seen (all)</button>
        </div>
      </div>

      <div class="card">
        <h3>Response</h3>
        <pre id="output">Siap. Klik tombol endpoint untuk uji API.</pre>
        <p class="muted"><a href="./index.html">Kembali ke index</a></p>
      </div>
    </div>
    <script>
      function todayYmd() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
      }

      document.getElementById('leaveStart').value = todayYmd();
      document.getElementById('leaveEnd').value = todayYmd();

      function headers(withUser) {
        const h = { 'Content-Type': 'application/json' };
        if (withUser !== false) {
          h['x-user-email'] = document.getElementById('userEmail').value.trim().toLowerCase();
          h['x-employee-id'] = document.getElementById('employeeId').value.trim();
          h['x-user-role'] = document.getElementById('userRole').value.trim().toLowerCase();
        }
        return h;
      }

      function base() {
        return document.getElementById('baseUrl').value.trim().replace(/\/+$/, '');
      }

      async function showResponse(resp) {
        const text = await resp.text();
        let body = text;
        try { body = JSON.parse(text); } catch (err) {}
        document.getElementById('output').textContent = JSON.stringify({
          status: resp.status,
          ok: resp.ok,
          body: body
        }, null, 2);
      }

      async function callGet(path, withUser) {
        const resp = await fetch(base() + path, { method: 'GET', headers: headers(withUser) });
        await showResponse(resp);
      }

      async function callPost(path, payload, withUser) {
        const resp = await fetch(base() + path, {
          method: 'POST',
          headers: headers(withUser),
          body: JSON.stringify(payload || {})
        });
        await showResponse(resp);
      }

      async function doCheckIn() {
        await callPost('/api/me/attendance/check-in', {
          lokasi: document.getElementById('attLokasi').value.trim(),
          work_mode: document.getElementById('attWorkMode').value.trim(),
          status: document.getElementById('attStatus').value.trim(),
          catatan: document.getElementById('attCatatan').value.trim()
        });
      }

      async function doCheckOut() {
        await callPost('/api/me/attendance/check-out', {
          lokasi: document.getElementById('attLokasi').value.trim(),
          status: document.getElementById('attStatus').value.trim(),
          catatan: document.getElementById('attCatatan').value.trim()
        });
      }

      async function submitLeave() {
        await callPost('/api/me/leaves', {
          jenis_cuti: document.getElementById('leaveType').value.trim(),
          tanggal_mulai: document.getElementById('leaveStart').value.trim(),
          tanggal_selesai: document.getElementById('leaveEnd').value.trim(),
          jumlah_hari: Number(document.getElementById('leaveDays').value || 0),
          alasan: document.getElementById('leaveReason').value.trim()
        });
      }

      async function markNotif(type) {
        await callPost('/api/me/notifications/mark-seen', { type: type || 'all' });
      }
    </script>
  </body>
</html>
