<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Trend ESS v5">
  <link rel="manifest" href="/api/assets/manifest.webmanifest?v=7">
  <link rel="icon" type="image/png" sizes="192x192" href="/api/assets/favicon-192.png?v=7">
  <link rel="icon" type="image/png" sizes="512x512" href="/api/assets/favicon-512.png?v=7">
  <link rel="apple-touch-icon" sizes="180x180" href="/api/assets/apple-touch-icon.png?v=7">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/api/assets/apple-touch-icon-precomposed.png?v=7">
  <title>ESS Karyawan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --primary: #4F46E5; --secondary: #6366F1; --primary-light: #EEF2FF;
      --bg: #F9FAFB; --card: #FFFFFF; --sidebar-bg: #F8FAFC; --border: #E5E7EB;
      --text-main: #111827; --text-sec: #6B7280;
      --success: #10B981; --success-bg: #D1FAE5;
      --warning: #F59E0B; --warning-bg: #FEF3C7; --danger: #EF4444; --danger-bg: #FEE2E2;
      --radius-lg: 20px; --radius-md: 16px; --radius-sm: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.04), 0 4px 10px -2px rgba(0,0,0,0.02);
      --shadow-hover: 0 14px 30px -4px rgba(79, 70, 229, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }
    .layout { display: flex; height: 100vh; height: 100dvh; }
    .sidebar { width: 240px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 20px; transition: transform 0.3s ease; z-index: 50; flex-shrink: 0; }
    .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding: 0 8px; }
    .logo img { height: 32px; width: auto; }
    .logo-text { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
    .sidebar-menu { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; }
    .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; text-decoration: none; color: var(--text-sec); border-radius: var(--radius-sm); font-weight: 500; font-size: 14px; transition: all 0.2s ease; cursor:pointer; border:none; background:transparent; width:100%; text-align:left; }
    .menu-item i { font-size: 20px; }
    .menu-item:hover { background-color: var(--border); color: var(--text-main); }
    .menu-item.active { background-color: var(--primary-light); color: var(--primary); }
    .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }
    .header { min-height: 72px; display: flex; justify-content: space-between; align-items: center; padding: 10px clamp(16px, 2vw, 28px); background-color: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .search-bar { display: flex; align-items: center; gap: 10px; background-color: var(--bg); padding: 10px 16px; border-radius: 99px; border: 1px solid var(--border); width: min(320px, 42vw); transition: all 0.2s; }
    .search-bar:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background-color: var(--card); }
    .search-bar i { color: var(--text-sec); font-size: 18px; }
    .search-bar input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; font-family: inherit; }
    .header-right { display: flex; align-items: center; gap: clamp(10px, 1.8vw, 22px); flex-wrap: wrap; justify-content: flex-end; }
    .date-display { display: flex; align-items: center; gap: 8px; color: var(--text-sec); font-size: 14px; font-weight: 500; }
    .icon-btn { background: none; border: none; font-size: 22px; color: var(--text-sec); cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: background 0.2s; }
    .icon-btn:hover { background-color: var(--bg); color: var(--text-main); }
    .badge { position: absolute; top: 6px; right: 6px; background-color: #EF4444; color: white; font-size: 10px; font-weight: 700; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid var(--card); }
    .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); transition: background 0.2s; }
    .user-profile:hover { background-color: var(--bg); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-weight: 600; font-size: 14px; }
    .user-role { font-size: 12px; color: var(--text-sec); }
    
    .content-grid { flex: 1; display: grid; grid-template-columns: minmax(0,1fr) minmax(320px, 380px); align-content: start; gap: 20px; padding: clamp(18px, 2vw, 28px); overflow-y: auto; }
    .content-grid.full-width { grid-template-columns: 1fr; }
    .middle-col { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
    
    .greeting h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .greeting p { color: var(--text-sec); font-size: 15px; }
    .cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; align-items: stretch; }
    
    .card { background-color: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 22px; transition: box-shadow 0.3s ease, transform 0.3s ease; height: 100%; }
    .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    
    /* Shift Progress Card (adapted from payslip) */
    .payslip-content { display: flex; align-items: center; gap: 24px; height: 100%; }
    .donut-chart-dummy { width: 90px; height: 90px; flex-shrink: 0; }
    .circular-chart { display: block; margin: 0 auto; max-width: 100%; max-height: 250px; }
    .circle-bg { fill: none; stroke: var(--primary-light); stroke-width: 3.8; }
    .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; stroke: var(--primary); animation: progress 1s ease-out forwards; }
    .percentage { fill: var(--text-main); font-family: 'Inter', sans-serif; font-size: 8px; font-weight: 700; text-anchor: middle; }
    .payslip-info { flex: 1; display: flex; flex-direction: column; }
    .salary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .salary-label { font-size: 13px; color: var(--text-sec); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .salary-amount { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; color: var(--text-main); }
    .salary-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-sec); margin-bottom: 16px; }
    .salary-meta span { display: flex; align-items: center; gap: 6px; }
    .salary-meta i { color: var(--primary); font-size: 16px; }
    
    .action-card { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border: none; display: flex; align-items: center; justify-content: space-between; }
    .action-text { flex: 1; }
    .action-text h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .action-text p { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 20px; line-height: 1.4; }
    .btn-white { background-color: white; color: var(--primary); border: none; padding: 10px 20px; border-radius: 99px; font-weight: 600; font-size: 14px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    .action-illustration { font-size: 80px; color: rgba(255,255,255,0.2); margin-left: 16px; }
    
    .bottom-row { grid-template-columns: 3fr 2fr; }
    
    .tab-nav { display: flex; gap: 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab-btn { background: none; border: none; padding: 8px 0 12px; font-size: 15px; font-weight: 600; color: var(--text-sec); cursor: pointer; position: relative; transition: color 0.2s; }
    .tab-btn:hover { color: var(--text-main); }
    .tab-btn.active { color: var(--primary); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background-color: var(--primary); border-radius: 2px 2px 0 0; }
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    .clean-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
    .clean-list li { display: flex; align-items: center; gap: 16px; }
    .avatar-sm { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; }
    .icon-box { width: 44px; height: 44px; border-radius: var(--radius-sm); background-color: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .list-text { flex: 1; display: flex; flex-direction: column; }
    .list-title { font-weight: 600; font-size: 14px; color: var(--text-main); }
    .list-desc { font-size: 13px; color: var(--text-sec); }
    .btn-icon { background: var(--bg); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; transition: all 0.2s; }
    .btn-icon:hover { background: var(--primary); color: white; border-color: var(--primary); }
    
    .team-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .team-stat { display: flex; flex-direction: column; }
    .stat-large { font-size: 42px; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 4px; letter-spacing: -0.02em; }
    .stat-label { font-size: 14px; color: var(--text-sec); font-weight: 500; }
    .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .status-badge.on-time { background-color: var(--success-bg); color: var(--success); }
    .status-badge.on-leave { background-color: var(--warning-bg); color: var(--warning); }
    
    /* RIGHT COLUMN (ATTENDANCE) */
    .right-col { display:flex; flex-direction:column; align-self:start; position:sticky; top: 0; }
    .attendance-widget { background: linear-gradient(180deg, var(--primary-light) 0%, var(--card) 100%); border-radius: var(--radius-lg); padding: 24px 20px; box-shadow: var(--shadow-sm); min-height: 620px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .attendance-widget::before { content: ''; position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; z-index: 0; }
    .attendance-widget > * { position: relative; z-index: 1; }
    .widget-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
    .widget-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .widget-header p { font-size: 13px; color: var(--text-sec); }
    .btn-icon-light { background: rgba(255,255,255,0.5); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 18px; cursor: pointer; transition: background 0.2s; }
    .btn-icon-light:hover { background: white; }
    .timer-display { text-align: center; margin-bottom: 24px; }
    .timer-value { font-family: 'Inter', monospace; font-size: 48px; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; margin-bottom: 8px; font-variant-numeric: tabular-nums; }
    .timer-label { font-size: 14px; font-weight: 500; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; }
    
    .status-animation-box { text-align:center; margin-bottom:24px; padding:16px; background:rgba(255,255,255,0.5); border-radius:var(--radius-sm); border:1px dashed var(--border); }
    .anim-icon { font-size:48px; color:var(--primary); margin-bottom:8px; display:inline-block; }
    .anim-working { animation: pulse-soft 2s infinite; }
    .anim-break { animation: rock 2s infinite; color: var(--warning); }
    .anim-done { color: var(--success); }
    .anim-idle { color: var(--text-sec); opacity:0.5; }
    @keyframes pulse-soft { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    @keyframes rock { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }

    .tracker-info { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
    .info-box { display: flex; align-items: center; gap: 16px; background-color: var(--card); padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .info-box i { font-size: 24px; color: var(--primary); background-color: var(--primary-light); padding: 10px; border-radius: 10px; }
    .info-text { display: flex; flex-direction: column; }
    .info-text span { font-size: 12px; color: var(--text-sec); margin-bottom: 2px; }
    .info-text strong { font-size: 15px; color: var(--text-main); font-weight: 600; }
    .break-box { display: flex; align-items: center; justify-content: space-between; background-color: var(--card); padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 14px; }
    .break-text { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
    .break-text i { color: var(--warning); font-size: 20px; }
    .btn-outline-light { background: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 99px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-outline-light:hover { background: var(--bg); border-color: var(--text-sec); }
    .btn-signout { width: 100%; background: linear-gradient(135deg, #111827 0%, #374151 100%); color: white; border: none; padding: 16px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; margin-bottom: 10px; transition: transform 0.2s, box-shadow 0.2s; }
    .btn-signout:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(17, 24, 39, 0.15); }
    .btn-signout:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .widget-footer { text-align: center; }
    .view-link { color: var(--text-sec); text-decoration: none; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; cursor:pointer;}
    .view-link:hover { color: var(--primary); }

    /* Other pages / Generic Forms / Tables */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: var(--text-main); }
    input, select, textarea { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: #fff; color: var(--text-main); outline: none; font-family: inherit; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .table-wrap { width: 100%; overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--border); background: #fff; margin-top: 16px; -webkit-overflow-scrolling: touch; }
    table { width: 100%; min-width: max-content; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid var(--border); padding: 14px 16px; text-align: left; font-size: 14px; vertical-align: middle; }
    th { background: var(--bg); font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; align-items: center; }
    .btn { display: inline-flex; align-items: center; gap: 8px; border: 0; border-radius: 99px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: .2s ease; max-width: 100%; }
    .btn.is-loading { opacity: .75; pointer-events: none; }
    .spin { display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-right-color:transparent; border-radius:50%; animation: spin .8s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--secondary); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.2); }
    .btn-secondary { background: var(--primary-light); color: var(--primary); }
    .btn-secondary:hover { background: #E0E7FF; transform: translateY(-1px); }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .file-hint { font-size: 12px; margin-top: 8px; color: var(--text-sec); }
    .muted { color: var(--text-sec); font-size: 14px; }
    .error { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; font-weight: 600; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(17,24,39,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; backdrop-filter: blur(4px); }
    .sidebar-backdrop { position: fixed; inset: 0; background: rgba(17,24,39,0.5); z-index: 40; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(2px); }
    .sidebar-backdrop.show { opacity: 1; visibility: visible; }
    .modal-card { width: min(860px, 96vw); max-height: 92vh; overflow: auto; background: #fff; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-lg); }
    .mobile-bottom-nav { display:none; position:fixed; left:0; right:0; bottom:0; height:68px; background:#fff; border-top:1px solid var(--border); z-index:1200; padding:6px 8px calc(6px + env(safe-area-inset-bottom)); overflow-x:auto; gap:4px; align-items:stretch; -webkit-overflow-scrolling:touch; scrollbar-width: none; }
    .mobile-bottom-nav::-webkit-scrollbar { display: none; }
    .mobile-nav-btn { border:none; background:transparent; color:var(--text-sec); min-width:74px; padding:6px 8px; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:11px; font-weight:600; cursor:pointer; }
    .mobile-nav-btn i { font-size:18px; }
    .mobile-nav-btn.active { color:var(--primary); background:var(--primary-light); }

    @media (max-width: 1200px) { .content-grid { grid-template-columns: 1fr; } .right-col { position: static; order: -1; } .attendance-widget { min-height: 0; } }
    @media (max-width: 992px) { .sidebar { position: fixed; transform: translateX(-100%); height: 100vh; box-shadow: var(--shadow-lg); } .sidebar.open { transform: translateX(0); } .search-bar { display: none; } .cards-row { grid-template-columns: 1fr; } .table-wrap { margin-top: 12px; } table { min-width: 100%; } .mobile-bottom-nav { display:flex; justify-content: space-around; } .main-wrapper { padding-bottom: calc(68px + env(safe-area-inset-bottom)); } .header { padding: 10px 12px; } .header-right { gap: 8px; } .user-info { display:none; } .modal-card { padding: 16px; } }
    @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; padding: 12px; gap:16px; } .right-col { order: -1; margin-bottom:10px; } .header-right .date-display { display: none; } .tracker-info { grid-template-columns: 1fr; } .actions .btn { width: 100%; justify-content: center; } table { min-width: 100%; } th,td { padding: 12px; font-size: 13px; } .greeting h1 { font-size: 24px; } .salary-amount { font-size: 26px; } .timer-value { font-size: 36px; } .card { padding: 18px; } .mobile-nav-btn { min-width: 0; flex: 1; } }
  </style>
</head>
<body>
  <div id="sidebar_backdrop" class="sidebar-backdrop" onclick="closeSidebar()"></div>
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><img src="https://trendhorizone.id/wp-content/uploads/2024/07/174135616958657596.png" alt="Logo"></div>
        <button class="mobile-close" onclick="closeSidebar()" style="display:none;"><i class="ph ph-x"></i></button>
      </div>
      <nav class="sidebar-menu">
        <button class="menu-item active" data-nav-id="home" onclick="navTo('home'); loadEmployeeHome()"><i class="ph ph-squares-four"></i><span>Home</span></button>
        <button class="menu-item" data-nav-id="leave" onclick="navTo('leave'); loadLeaveForm()"><i class="ph ph-calendar-blank"></i><span>Leave</span></button>
        <button class="menu-item" data-nav-id="history" onclick="navTo('history'); loadMyAttendanceHistory()"><i class="ph ph-clock"></i><span>Attendance History</span></button>
        <button class="menu-item" data-nav-id="payroll" onclick="navTo('payroll'); loadMyPayrollDocs()"><i class="ph ph-wallet"></i><span>Salary</span></button>
        <button class="menu-item" data-nav-id="schedule" onclick="navTo('schedule'); loadMyMonthlySchedule()"><i class="ph ph-calendar-check"></i><span>Schedule</span></button>

  <script>
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');

      if (backdrop) backdrop.classList.add('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      const backdrop = document.getElementById('sidebar_backdrop');
      if (backdrop) backdrop.classList.remove('show');
    }
    
    // Swipe gestures for sidebar
    let touchStartX = 0;
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});
    document.addEventListener('touchend', function(e) {
      if (window.innerWidth > 992) return;
      let touchEndX = e.changedTouches[0].screenX;
      let diff = touchEndX - touchStartX;
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;
      if (diff > 50 && touchStartX < 30) openSidebar();
      if (diff < -50 && sidebar.classList.contains('open')) closeSidebar();
    }, {passive: true});

    let employeeCurrentSection='home';
    let employeeScheduleRefreshTimer=null;
    let employeeTodayShiftCode='PAGI';
    let employeeShiftWatchTimer=null;
    let employeeShiftWatchVersion='';

    let employeeLastHomeLoadedAt=0;
    let employeeHomeCache=null;
    function navTo(id){

    if(window.innerWidth<=992) { document.getElementById('mobileToggle').style.display='block'; document.querySelector('.mobile-close').style.display='block'; }
    document.getElementById('header_date').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'2-digit', month:'short'});

    let workDurationTimer=null;
    let leaveAttachmentPayload=null;
    async function safeRefreshHome(trigger){
      if(employeeCurrentSection!=='home') return;
      if(employeeHomeLoading) return;
      const now=Date.now();
      if(trigger==='focus' && now-employeeLastHomeLoadedAt<120000) return;
      await loadEmployeeHome();
    }
    function ensureEmployeeResponsiveSchedule(){
      if(employeeScheduleRefreshTimer) return;
      employeeScheduleRefreshTimer=setInterval(async function(){
        try{ await safeRefreshHome('interval'); }catch(_){}
      }, 300000);
      window.addEventListener('focus', async function(){ try{ await safeRefreshHome('focus'); }catch(_){} });
    }
    function showShiftToast(message){
      const id='shift_change_toast';
      let el=document.getElementById(id);
      if(!el){
        el=document.createElement('div');
        el.id=id;
        el.style.cssText='position:fixed;right:18px;bottom:18px;z-index:3000;background:#0b1220;color:#fff;padding:12px 14px;border-radius:12px;box-shadow:0 12px 28px rgba(0,0,0,.2);font-size:13px;max-width:min(360px,90vw);';
        document.body.appendChild(el);
      }
      el.textContent=String(message||'Jadwal shift diperbarui.');
      el.style.display='block';
      clearTimeout(el.__hideTimer);
      el.__hideTimer=setTimeout(function(){ el.style.display='none'; }, 4200);
    }
    async function refreshShiftWatchSeed(){
      try{
        const watch=await api('/api/me/schedule/watch');
        const v=String((watch&&watch.version)||'');
        if(v) employeeShiftWatchVersion=v;
      }catch(_){}
    }
    function ensureShiftWatcher(){
      if(employeeShiftWatchTimer) return;
      employeeShiftWatchTimer=setInterval(async function(){
        try{
          const watch=await api('/api/me/schedule/watch');
          const v=String((watch&&watch.version)||'');
          if(!employeeShiftWatchVersion){ employeeShiftWatchVersion=v; return; }
          if(v && v!==employeeShiftWatchVersion){
            employeeShiftWatchVersion=v;
            employeeTodayShiftCode=String((watch&&watch.shift_code)||employeeTodayShiftCode||'PAGI');
            showShiftToast('Jadwal shift diperbarui oleh admin: ' + employeeTodayShiftCode);
            if(employeeCurrentSection==='home') await loadEmployeeHome();
          }
        }catch(_){}
      }, 12000);
    }
    function safe(v){ return v===null||v===undefined?'':v; }
    function escapeHtml(v){ return String(safe(v)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function clearWorkDurationTicker(){ if(workDurationTimer){ clearInterval(workDurationTimer); workDurationTimer=null; } }
    
    function setContentLayout(middleHtml, rightHtml){
        clearWorkDurationTicker();
        const grid = document.getElementById('main_content_grid');
        if(rightHtml) {
            grid.className = 'content-grid';
            grid.innerHTML = `<main class="middle-col">${middleHtml}</main><aside class="right-col">${rightHtml}</aside>`;
        } else {
            grid.className = 'content-grid full-width';
            grid.innerHTML = `<main class="middle-col">${middleHtml}</main>`;
        }
    }
    
    function setLoading(t){ setContentLayout(`<div class="card"><h3 style="display:flex;align-items:center;gap:8px;"><span class="spin"></span>${escapeHtml(t||'Loading...')}</h3><p class="muted">Please wait a moment.</p></div>`, ''); }
    function resolveActionButton(btnOrId){
      if(btnOrId && btnOrId.tagName) return btnOrId;
      if(typeof btnOrId==='string' && btnOrId) return document.getElementById(btnOrId);
      const ev=window.event;
      const el=(ev&&ev.currentTarget)||(ev&&ev.target)||null;
      return el&&el.closest?el.closest('button'):null;
    }
    async function runWithButtonLoading(btnOrId, loadingLabel, idleHtml, task){
      const btn=resolveActionButton(btnOrId);
      const prevHtml=btn?btn.innerHTML:'';
      if(btn){
        btn.disabled=true;
        btn.classList.add('is-loading');
        btn.innerHTML='<span class="spin"></span> '+escapeHtml(String(loadingLabel||'Processing...'));
      }
      try{
        return await task();
      }finally{
        if(btn){
          btn.disabled=false;
          btn.classList.remove('is-loading');
          btn.innerHTML=idleHtml || prevHtml;
        }
      }
    }
    function renderError(m){ return `<div class="card"><div class="error">${escapeHtml(m||'Error occurred.')}</div></div>`; }
    function formatDateTimeDisplay(value){ if(!value) return ''; const d=new Date(value); if(isNaN(d.getTime())) return String(value); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); }
    function formatDateDisplay(value){ if(!value) return ''; const d=new Date(value); if(isNaN(d.getTime())) return String(value); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function nowHmsWIB(){ const p=new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date()).reduce(function(a,x){ if(x&&x.type) a[x.type]=x.value; return a; },{}); return String(p.hour||'00')+':'+String(p.minute||'00')+':'+String(p.second||'00'); }
    function hmsToSec(v){ const s=String(v||'').trim(); const m=s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/); if(!m) return 0; return Number(m[1]||0)*3600+Number(m[2]||0)*60+Number(m[3]||0); }
    function isValidHms(v){ return /^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.test(String(v||'').trim()); }
    function diffSecClock(a,b){ if(!isValidHms(a)||!isValidHms(b)) return 0; const x=hmsToSec(a), y=hmsToSec(b); return y>=x?(y-x):((24*3600-x)+y); }
    function secToDigital(total){ const t=Math.max(0,Math.floor(Number(total||0))); const h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
    function fileToAttachmentObject(file){
      return new Promise(function(resolve,reject){
        if(!file) return resolve(null);
        const reader=new FileReader();
        reader.onload=function(){
          const dataUrl=String(reader.result||'');
          const parts=dataUrl.split(',');
          const base64Data=parts[1]||'';
          if(!base64Data) return reject(new Error('File tidak valid.'));
          resolve({
            fileName:String(file.name||('lampiran_'+Date.now())),
            mimeType:String(file.type||'application/octet-stream'),
            base64Data:base64Data
          });
        };
        reader.onerror=function(){ reject(new Error('Gagal membaca file lampiran.')); };
        reader.readAsDataURL(file);
      });
    }
    function selectedLeaveTypeRequiresAttachment(){
      const typeEl=document.getElementById('lv_type');
      const selected=String((typeEl&&typeEl.value)||'').trim().toLowerCase();
      const ref=(leaveTypesCache||[]).find(function(t){
        return String(t.nama_jenis_cuti||'').trim().toLowerCase()===selected;
      })||null;
      if(ref&&(ref.requires_attachment===true||String(ref.requires_attachment).toLowerCase()==='true')) return true;
      return /sakit/.test(selected);
    }
    function updateLeaveAttachmentVisibility(){
      const box=document.getElementById('leave_attachment_wrap');
      const req=document.getElementById('leave_attachment_required');
      if(!box||!req) return;
      const required=selectedLeaveTypeRequiresAttachment();
      req.textContent=required?'Wajib untuk jenis cuti ini':'Opsional';
      req.style.color=required?'var(--danger)':'var(--text-sec)';

    async function onLeaveAttachmentChange(input){
      try{
        const file=input&&input.files&&input.files[0]?input.files[0]:null;
        const info=document.getElementById('leave_attachment_info');
        if(!file){
          leaveAttachmentPayload=null;
          if(info) info.textContent='Belum ada file dipilih';
          return;
        }
        leaveAttachmentPayload=await fileToAttachmentObject(file);
        if(info) info.textContent='File siap: '+String(file.name||'-')+' ('+Math.ceil(Number(file.size||0)/1024)+' KB)';
      }catch(err){
        leaveAttachmentPayload=null;
        alert(err.message);
        if(input) input.value='';
      }
    }
    
    function startWorkDurationTicker(data){
      const el=document.getElementById('digitalTimer');
      if(!el) return;
      const baseBreakSec=Math.max(0,Number(data&&data.break_total_seconds||0));
      const masuk=String(data&&data.jam_masuk||'');
      const keluar=String(data&&data.jam_keluar||'');
      const breakActive=!!(data&&data.break_active);
      const breakStart=String(data&&data.break_active_start||'');
      const tick=function(){
        if(!masuk){ el.textContent='00:00:00'; return; }
        const nowHms=nowHmsWIB();
        let gross=keluar?diffSecClock(masuk,keluar):diffSecClock(masuk,nowHms);
        let breakSec=baseBreakSec;
        if(!keluar && breakActive && breakStart){ breakSec += diffSecClock(breakStart,nowHms); }
        const eff=Math.max(0,gross-breakSec);
        el.textContent=secToDigital(eff);
      };
      tick();
      if(!keluar){ workDurationTimer=setInterval(tick,1000); }
    }

    function resolveIdentity(){
      const q=new URLSearchParams(window.location.search||'');
      const email=q.get('email')||q.get('user_email')||'';
      const emp=q.get('employee_id')||q.get('emp_id')||'';
      if(email){ localStorage.setItem('ess_demo_email',email); localStorage.setItem('ess_user_email',email); }
      if(emp){ localStorage.setItem('ess_demo_employee_id',emp); localStorage.setItem('ess_employee_id',emp); }
      if(localStorage.getItem('ess_user_email')&&!localStorage.getItem('ess_demo_email')) localStorage.setItem('ess_demo_email',localStorage.getItem('ess_user_email'));
      if(localStorage.getItem('ess_employee_id')&&!localStorage.getItem('ess_demo_employee_id')) localStorage.setItem('ess_demo_employee_id',localStorage.getItem('ess_employee_id'));
      if(!localStorage.getItem('ess_user_role')) localStorage.setItem('ess_user_role','employee');
    }
    function sessionToken(){ return localStorage.getItem('ess_session_token')||''; }
    function isAdminRole(role){ return /^(admin|superadmin)$/i.test(String(role||'').trim()); }
    async function ensureSessionLogin(){
      const token=sessionToken();
      if(!token){ location.href='/login'; return false; }
      const r=await fetch(base()+'/api/auth/session/me',{headers:{Authorization:'Bearer '+token}});
      const j=await r.json();
      if(!r.ok||!j.authenticated||!j.user){ localStorage.removeItem('ess_session_token'); location.href='/login'; return false; }
      if(isAdminRole((j.user||{}).role) || !!(j.user||{}).is_admin){ location.href='/admin'; return false; }
      localStorage.setItem('ess_user_email',j.user.email||'');
      localStorage.setItem('ess_employee_id',j.user.employee_id||'');
      localStorage.setItem('ess_user_role',j.user.role||'employee');
      if(j.first_login_required) localStorage.setItem('ess_force_profile_setup','1'); else localStorage.removeItem('ess_force_profile_setup');
      return true;
    }
    async function logoutSession(){
      try{ await fetch(base()+'/api/auth/logout',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+sessionToken()}}); }catch(_){}
      localStorage.removeItem('ess_session_token');
      localStorage.removeItem('ess_force_profile_setup');
      location.href='/login';
    }
    function hdr(){
      resolveIdentity();
      return { 'Content-Type':'application/json', 'x-user-email':localStorage.getItem('ess_user_email')||localStorage.getItem('ess_demo_email')||'demo@contoh.com', 'x-employee-id':localStorage.getItem('ess_employee_id')||localStorage.getItem('ess_demo_employee_id')||'EMP_DEMO_001', 'x-user-role':localStorage.getItem('ess_user_role')||'employee', 'Authorization':'Bearer '+sessionToken() };
    }
    function base(){ const fixed='https://ess-2026-trendhorizone-id.vercel.app'; const host=String(location.hostname||'').toLowerCase(); const origin=String(location.origin||'').trim().replace(/\/+$/,''); if(host==='localhost'||host==='127.0.0.1') return localStorage.getItem('ess_api_base') || fixed; return origin || fixed; }
    async function api(path,method,body,opt){
      const timeoutMs=Math.max(1500, Number((opt&&opt.timeoutMs)||9000));
      const c=new AbortController();
      const tm=setTimeout(function(){ try{ c.abort(); }catch(_){} }, timeoutMs);
      try{
        const r=await fetch(base()+path,{method:method||'GET',headers:hdr(),body:body?JSON.stringify(body):undefined,signal:c.signal});
        const tx=await r.text();
        let d=tx; try{d=JSON.parse(tx);}catch(e){}
        if(!r.ok){ const err=new Error((d&&d.message)||'Request failed'); err.status=r.status; err.path=path; throw err; }
        return d;
      }catch(e){
        if(e&&e.name==='AbortError'){ const err=new Error('Request timeout: '+String(path||'')); err.status=408; err.path=path; throw err; }
        throw e;
      }finally{
        clearTimeout(tm);
      }
    }

    function moneyId(n){ return 'Rp ' + Number(n||0).toLocaleString('id-ID'); }
    function payrollRenderer(doc){
      const earnings=((doc&&doc.breakdown&&doc.breakdown.earnings)||[]);
      const deductions=((doc&&doc.breakdown&&doc.breakdown.deductions)||[]);
      const maxLen=Math.max(earnings.length,deductions.length,1);
      const rows=Array.from({length:maxLen}).map(function(_,i){
        const e=earnings[i]||null;
        const d=deductions[i]||null;
        return `<tr><td>${escapeHtml((e&&e.name)||'')}</td><td style="text-align:right;">${escapeHtml(e?moneyId(e.value||0):'')}</td><td>${escapeHtml((d&&d.name)||'')}</td><td style="text-align:right;">${escapeHtml(d?moneyId(d.value||0):'')}</td></tr>`;
      }).join('');
      return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:14px;">
          <div>
            <div style="font-size:24px;font-weight:800;letter-spacing:.2px;">Tren Gen Horizon</div>
            <div class="stat-label">Employee Payslip</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <img src="https://ess-tren-gen-horizon.vercel.app/logo-trend-horizon.jpg" alt="logo" style="width:72px;height:72px;object-fit:contain;border-radius:12px;background:#fff;border:1px solid var(--border);" />
            <div class="actions"><button class="btn btn-secondary" onclick="loadMyPayrollDocs()">Back</button>${doc&&doc.file_url?`<a href="${escapeHtml(doc.file_url)}" target="_blank" class="btn btn-primary">Download PDF</a>`:''}</div>

    function dataUrlToPhotoObject(dataUrl){
      const parts=String(dataUrl||'').split(',');
      return { fileName:'attendance_'+Date.now()+'.jpg', mimeType:(parts[0].match(/data:(.*?);base64/i)||[])[1]||'image/jpeg', base64Data:parts[1]||'' };
    }
    
    async function captureSelfiePayload(){
      const video=document.getElementById('attendance_camera_video');
      if(!video||!video.videoWidth) throw new Error('Camera not ready.');
      const full=document.createElement('canvas'); full.width=video.videoWidth; full.height=video.videoHeight;
      full.getContext('2d').drawImage(video,0,0,full.width,full.height);
      const dataUrl=full.toDataURL('image/jpeg',0.92);
      return { photo:dataUrlToPhotoObject(dataUrl), dataUrl:dataUrl };
    }

    async function fileToBase64(file){
      return new Promise(function(resolve, reject){
        const fr = new FileReader();
        fr.onload = function(){
          const img = new Image();
          img.onload = function(){
            const canvas = document.createElement('canvas');
            let w = img.width; let h = img.height;
            const maxW = 400; const maxH = 400;
            if(w > h && w > maxW) { h = Math.round(h * (maxW / w)); w = maxW; }
            else if(h > maxH) { w = Math.round(w * (maxH / h)); h = maxH; }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            // Fill with white to prevent black background on transparent PNGs
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            resolve(dataUrl.split(',')[1] || '');
          };
          img.onerror = reject;
          img.src = fr.result;
        };
        fr.onerror = reject;
        fr.readAsDataURL(file);
      });
    }
