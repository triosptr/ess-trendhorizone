<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESS Login</title>
  <style>
    :root{--bg:#f3f6fb;--card:#fff;--text:#0f172a;--muted:#64748b;--primary:#2563eb;--border:#e2e8f0}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top right,#dbeafe 0,#f3f6fb 45%,#f8fafc 100%);color:var(--text)}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(440px,100%);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:0 16px 40px rgba(15,23,42,.1)}
    .head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .logo{width:44px;height:44px;border-radius:12px;object-fit:contain;background:#fff;border:1px solid var(--border)}
    h1{margin:0;font-size:22px}.muted{color:var(--muted);font-size:13px}
    label{font-size:12px;font-weight:700;color:#334155;display:block;margin:12px 0 6px}
    input{width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px}
    input:focus{outline:none;border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.14)}
    button{width:100%;padding:11px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-weight:700;margin-top:14px;cursor:pointer}
    .msg{margin-top:10px;padding:10px 12px;border-radius:10px;font-size:13px;display:none}
    .err{background:#fef2f2;color:#991b1b}.ok{background:#ecfeff;color:#0f766e}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <img class="logo" src="https://ess-tren-gen-horizon.vercel.app/logo-trend-horizon.jpg" alt="logo"/>
        <div>
          <h1>ESS Login</h1>
          <div class="muted">Masuk dengan email & password aktivasi</div>
        </div>
      </div>
      <form id="f">
        <label>Email</label>
        <input id="email" type="email" placeholder="nama@company.com" required />
        <label>Password</label>
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <div id="msg" class="msg"></div>
    </div>
  </div>
  <script>
    const apiBase=(localStorage.getItem('ess_api_base')||'https://ess-2026-trendhorizone-id.vercel.app').replace(/\/+$/,'');
    const $=id=>document.getElementById(id);
    function show(t,ok){ const m=$('msg'); m.className='msg '+(ok?'ok':'err'); m.textContent=t; m.style.display='block'; }
    async function sessionMe(token){ const r=await fetch(apiBase+'/api/auth/session/me',{headers:{Authorization:'Bearer '+token}}); return r.json(); }
    async function boot(){
      const token=localStorage.getItem('ess_session_token')||'';
      if(!token) return;
      try{
        const s=await sessionMe(token);
        if(!s.authenticated||!s.user) return;
        localStorage.setItem('ess_user_email',s.user.email||'');
        localStorage.setItem('ess_user_role',s.user.role||'employee');
        localStorage.setItem('ess_employee_id',s.user.employee_id||'');
        if(s.first_login_required) return location.href='/employee?setup=1';
        return location.href=(s.user.is_admin?'/admin':'/employee');
      }catch(_){}
    }
    $('f').addEventListener('submit', async function(e){
      e.preventDefault();
      const email=$('email').value.trim().toLowerCase();
      const password=$('password').value;
      try{
        const r=await fetch(apiBase+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const j=await r.json();
        if(!r.ok||!j.ok) throw new Error(j.message||'Login gagal');
        localStorage.setItem('ess_session_token',j.session_token||'');
        localStorage.setItem('ess_user_email',(j.user||{}).email||email);
        localStorage.setItem('ess_user_role',(j.user||{}).role||'employee');
        localStorage.setItem('ess_employee_id',(j.user||{}).employee_id||'');
        show('Login berhasil. Mengarahkan dashboard...',true);
        if(j.first_login_required) return setTimeout(()=>location.href='/employee?setup=1',350);
        return setTimeout(()=>location.href=((j.user||{}).is_admin?'/admin':'/employee'),350);
      }catch(err){ show(err.message||'Login gagal',false); }
    });
    boot();
  </script>
</body>
</html>
