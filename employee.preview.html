<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Employee Preview</title>
  <style>
    :root { --bg:#F9FAFB; --card:#FFFFFF; --text:#111827; --muted:#6B7280; --primary:#4F46E5; --line:#E5E7EB; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { width: min(560px, 100%); background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 10px 30px rgba(17,24,39,.06); padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: -.02em; }
    p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    a { display: inline-block; margin-top: 18px; text-decoration: none; background: var(--primary); color: #fff; border-radius: 999px; padding: 10px 16px; font-weight: 600; font-size: 14px; }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      window.location.replace('./local-dev/employee.preview.html');
    });
  </script>
</head>
<body>
  <div class="card">
    <h1>Employee Preview Dipindahkan</h1>
    <p>Halaman preview karyawan sekarang menggunakan tema baru di folder local-dev.</p>
    <a href="./local-dev/employee.preview.html">Buka Employee Preview Baru</a>
  </div>
</body>
</html>
