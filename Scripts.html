<script>
  function runServer(fnName, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)[fnName](...args);
    });
  }

  function safe(value) {
    return value === null || value === undefined ? '' : value;
  }

  function escapeHtml(value) {
    return String(safe(value))
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function renderError(message) {
    return `<div class="card"><div class="error">${escapeHtml(message || 'Terjadi kesalahan.')}</div></div>`;
  }

  function renderSuccess(message) {
    return `<div class="card"><div class="success">${escapeHtml(message || 'Berhasil.')}</div></div>`;
  }

  function renderEmpty(title, message) {
    return `
      <div class="card">
        <h3>${escapeHtml(title || 'Informasi')}</h3>
        <p>${escapeHtml(message || 'Tidak ada data.')}</p>
      </div>
    `;
  }

  function setContent(html) {
    const el = document.getElementById('content');
    if (el) el.innerHTML = html;
  }

  function setLoading(title = 'Memuat data...') {
    setContent(`
      <div class="card">
        <h3>${escapeHtml(title)}</h3>
        <p class="muted">Mohon tunggu sebentar.</p>
      </div>
    `);
  }

  function formatDateDisplay(value) {
    if (!value) return '';
    const str = String(value);

    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;

    const date = new Date(value);
    if (isNaN(date.getTime())) return str;

    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function formatDateTimeDisplay(value) {
    if (!value) return '';
    const date = new Date(value);

    if (isNaN(date.getTime())) return String(value);

    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    const ss = String(date.getSeconds()).padStart(2, '0');

    return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
  }

  function normalizeStatusBadge(status) {
    const s = String(safe(status)).trim().toLowerCase();

    if (s === 'approved' || s === 'active' || s === 'true' || s === 'hadir') {
      return `<span class="badge badge-success">${escapeHtml(status)}</span>`;
    }

    if (s === 'rejected' || s === 'inactive' || s === 'false') {
      return `<span class="badge badge-danger">${escapeHtml(status)}</span>`;
    }

    if (s === 'pending' || s === 'terlambat') {
      return `<span class="badge badge-warning">${escapeHtml(status)}</span>`;
    }

    return `<span class="badge badge-neutral">${escapeHtml(status || '-')}</span>`;
  }

  function confirmAction(message) {
    return window.confirm(message || 'Apakah Anda yakin?');
  }

  function notifyError(err) {
    console.error(err);
    const message = err && err.message ? err.message : String(err || 'Terjadi kesalahan.');
    setContent(renderError(message));
  }

  function extractDriveFileId(url) {
    const value = String(safe(url)).trim();
    if (!value) return '';

    let match = value.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (match && match[1]) return match[1];

    match = value.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (match && match[1]) return match[1];

    match = value.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (match && match[1]) return match[1];

    return '';
  }

  function buildDrivePreviewUrl(url) {
    const fileId = extractDriveFileId(url);
    if (!fileId) return '';
    return 'https://drive.google.com/file/d/' + fileId + '/preview';
  }

  function buildDriveOpenUrl(url) {
    const fileId = extractDriveFileId(url);
    if (!fileId) return String(safe(url)).trim();
    return 'https://drive.google.com/file/d/' + fileId + '/view';
  }

  function renderDrivePreview(url) {
    const rawUrl = String(safe(url)).trim();

    if (!rawUrl) {
      return '<span class="muted">Tidak ada lampiran</span>';
    }

    const previewUrl = buildDrivePreviewUrl(rawUrl);
    const openUrl = buildDriveOpenUrl(rawUrl);

    if (!previewUrl) {
      return '<a class="btn btn-primary" href="' + escapeHtml(openUrl) + '" target="_blank">Buka Lampiran</a>';
    }

    return '' +
      '<div style="display:flex; flex-direction:column; gap:8px; min-width:220px;">' +
        '<iframe ' +
          'src="' + escapeHtml(previewUrl) + '" ' +
          'width="220" ' +
          'height="160" ' +
          'style="border:1px solid #e2e8f0; border-radius:12px; background:#fff;" ' +
          'loading="lazy">' +
        '</iframe>' +
        '<a class="btn btn-primary" href="' + escapeHtml(openUrl) + '" target="_blank">Buka Lampiran</a>' +
      '</div>';
  }
</script>
